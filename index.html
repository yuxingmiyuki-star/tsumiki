/* ── リマインダー：ネイティブ通知ブリッジ ──────────────────────────────
   ネイティブ化（Capacitor / RN webview 等）した際、実機側が時刻通知を鳴らす。
   実機側は window.TsumikiNative に下記3メソッドを実装するだけでよい：
     reminderPermission(): Promise<boolean>
     scheduleReminder({ id:number, key:string, title:string, body:string,
                        hour:number, minute:number, weekdays:number[] }): Promise<void>
        ・weekdays は 0=日…6=土。空配列なら毎日。id は同一なら上書き（再スケジュール）。
     cancelReminder(id:number): Promise<void>
   ブリッジが無い環境（このプロトタイプ／ブラウザ）では全メソッドが安全に no-op。 */
const Reminders = {
  bridge() { try { return (typeof window !== "undefined" && window.TsumikiNative) || null; } catch { return null; } },
  notifId(key) { let h = 0; for (let i = 0; i < key.length; i++) h = (Math.imul(h, 31) + key.charCodeAt(i)) | 0; return (h >>> 0) % 2000000000 + 1; },
  async permission() { const b = this.bridge(); if (!b?.reminderPermission) return false; try { return !!(await b.reminderPermission()); } catch { return false; } },
  async schedule(key, { title, body, time, weekdays }) {
    const b = this.bridge(); if (!b?.scheduleReminder) return;
    const [hh, mm] = String(time || "08:00").split(":").map((n) => parseInt(n, 10) || 0);
    try { await b.scheduleReminder({ id: this.notifId(key), key, title, body, hour: hh, minute: mm, weekdays: weekdays || [] }); } catch {}
  },
  async cancel(key) { const b = this.bridge(); if (!b?.cancelReminder) return; try { await b.cancelReminder(this.notifId(key)); } catch {} },
};
// 習慣1つぶんのリマインダーを、remOn とゴールの状態に合わせて登録/解除する
const syncReminder = (goal, habit) => {
  if (!goal || !habit) return;
  const key = goal.id + ":" + habit.id;
  if (habit.remOn && !goal.graduated) {
    const mode = habit.fmode || "daily";
    const weekdays = mode === "days" ? (habit.days || []) : []; // 毎日/週まとめ は空＝毎日
    Reminders.schedule(key, { title: goal.name, body: `「${habit.name}」の時間`, time: habit.remTime || "08:00", weekdays });
  } else {
    Reminders.cancel(key);
  }
};

            <div style={{ position: "relative", width: D, height: D, transformStyle: "preserve-3d", transition: "transform .42s cubic-bezier(.2,.8,.3,1)", transform: isFlipped ? "rotateY(180deg)" : "none" }}>
              <button onContextMenu={(e) => e.preventDefault()} {...frontHandlers} style={{ ...s.circleBtn, position: "absolute", inset: 0, width: D, height: D, borderRadius: "50%", opacity: inactive ? 0.34 : 1, animation: gold ? "btnglow 1.8s ease-in-out infinite" : undefined, backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden", pointerEvents: isFlipped ? "none" : "auto" }} disabled={false}>
                {frontInner}
              </button>
              <button onContextMenu={(e) => e.preventDefault()} {...backHandlers} aria-label={`${h.name} の記録を編集（長押しでカレンダー）`} style={{ ...s.circleBtn, position: "absolute", inset: 0, width: D, height: D, borderRadius: "50%", border: `2px solid ${T.hair2}`, background: T.surface, transform: "rotateY(180deg)", backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden", pointerEvents: isFlipped ? "auto" : "none" }} disabled={false}>
                <Pencil size={sz.icon} color={T.hi} strokeWidth={2.2} style={{ position: "relative" }} />
              </button>
            </div>
          </div>
          )}
          {showPlay && (
            <button onPointerDown={(e) => e.stopPropagation()} onClick={(e) => { e.stopPropagation(); startTimer(i); }} aria-label={running ? "タイマーを止める" : "タイマー開始"} style={s.playBtn}>
              {running ? <span style={{ fontSize: 12, color: T.onGold }}>■</span> : <span style={{ fontSize: 15, color: T.onGold, marginLeft: 2 }}>▶</span>}
            </button>
          )}
          {!editMode && !isFlipped && streak > 0 && <span style={s.streakBadge}><Flame size={10} color="#0B0C10" strokeWidth={2.6} fill="#0B0C10" />{streak}</span>}
          {!editMode && !isFlipped && h.url && h.url.trim() && (
            <a href={/^https?:\/\//i.test(h.url.trim()) ? h.url.trim() : `https://${h.url.trim()}`}
              target="_blank" rel="noopener noreferrer" aria-label={`${h.name} のリンクを開く`}
              onPointerDown={(e) => e.stopPropagation()} onClick={(e) => e.stopPropagation()} style={s.linkBadge}>
              <ExternalLink size={11} color={T.lo} strokeWidth={2.4} />
            </a>
          )}
        </div>
        <span style={s.cellLabel}>{h.name}</span>
        {perDay > 1 && dueT && !full && <span style={{ ...s.cellStatus, color: tdc >= perDay ? T.gold : T.lo }}>{tdc}/{perDay}</span>}
        </>)}
      </div>
    );
  };

  return (
    <div className="tsumiki-app" style={{ ...s.page, "--ac": goldRgb(T).join(",") }} onContextMenu={(e) => e.preventDefault()}>
      <style>{KEY}</style>
      <div style={{ ...s.screen, gap: 6, padding: "6px 20px 18px", touchAction: "none" }} onPointerDown={onStageDown} onPointerMove={onStageMove} onPointerUp={onStageUp} onPointerCancel={onStageCancel}>
        <div style={{ display: "flex", flexDirection: "column", gap: 0, flexShrink: 0, height: 90, overflow: "visible" }}>
          <div style={s.bar}>
            <span style={s.wordmark}>GrainME</span>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <button style={{ ...s.analyzeBtn, visibility: hasGoal ? "visible" : "hidden" }} aria-label="分析" onClick={() => { setGoalDetail(curGi); setDetailPage(0); }}><BarChart3 size={16} color={T.lo} strokeWidth={2.2} /></button>
              <button style={s.iconBtn} aria-label="設定" onClick={() => { setIoMsg(""); setShowSettings(true); }}><Settings size={17} color={T.lo} strokeWidth={2} /></button>
            </div>
          </div>

          <div style={s.idBlock}>
            {hasGoal ? (<>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={s.idLabel}>なりたい自分</div>
                <div key={g.id} style={{ ...s.idName, color: full ? T.gold : T.hi, animation: "achfade .3s ease" }}><span style={{ display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{g.name}{full ? "（なれた）" : ""}</span></div>
              </div>
            </>) : (
              <div style={{ flex: 1, minWidth: 0, visibility: "hidden" }} aria-hidden>
                <div style={{ ...s.idLabel, height: 14 }}>なりたい自分</div>
                <div style={{ ...s.idName, height: 46 }}>&nbsp;</div>
              </div>
            )}
          </div>
        </div>

        <div ref={stageRef} style={{ ...s.stageWrap, position: "relative" }}>
          <div style={{ animation: trans ? `${trans.dir > 0 ? "orbInNext" : "orbInPrev"} .3s cubic-bezier(.22,1,.3,1)` : "none", opacity: drag ? 0 : 1 }}>
            <canvas ref={canvasRef} style={{ width: 320, height: 300, maxWidth: "100%", display: "block", margin: "0 auto" }} />
          </div>
          {trans && <img src={trans.url} alt="" onAnimationEnd={() => setTrans(null)} style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 320, height: 300, maxWidth: "100%", pointerEvents: "none", animation: `${trans.dir > 0 ? "orbOutNext" : "orbOutPrev"} .3s cubic-bezier(.22,1,.3,1) forwards` }} />}
          {hasGoal && cap > 0 && (
            <div style={s.frameTL}>
              {full ? <span style={{ ...s.frameN, color: T.gold, opacity: 1 }}>達成</span> : (<>
                <span style={s.frameN}>{cnt}</span><span style={s.frameU}>粒</span>
                <span style={s.framePct}>{Math.round(cnt / cap * 100)}%</span>
              </>)}
            </div>
          )}
          {hasGoal && cap === 0 && <div style={s.frameTL}><span style={{ ...s.frameU, fontSize: 12 }}>習慣を追加</span></div>}
          {hasGoal && (
            <div style={s.orbPhotoCtrl}>
              {photos[g.id] && <button style={s.orbPhotoBtn} onPointerDown={(e) => e.stopPropagation()} onClick={() => clearOrbPhoto(g.id)} aria-label="写真を外す">×</button>}
              <button style={s.orbPhotoBtn} onPointerDown={(e) => e.stopPropagation()} onClick={() => orbFileRef.current?.click()} aria-label="器の写真"><Camera size={15} color={T.lo} strokeWidth={2} /></button>
              <input ref={orbFileRef} type="file" accept="image/*" onChange={onOrbFile(g.id)} style={{ display: "none" }} />
            </div>
          )}
          {onAdd && (
            <div style={s.emptyOver}>
              <button style={s.addOrbPlus} onClick={openWizard} aria-label="なりたい自分を追加"><Plus size={38} color={T.gold} strokeWidth={2} /></button>
              <div style={s.addOrbLab}>{addKind === "first" ? "なりたい自分を追加しよう" : "なりたい自分を追加"}</div>
            </div>
          )}
          {drag && (
            <div ref={trackRef} style={{ position: "absolute", top: 0, left: 0, width: drag.w * 3, height: 300, transform: `translateX(${-drag.w}px)`, willChange: "transform", pointerEvents: "none" }}>
              {drag.urls.map((u, k) => (
                <div key={k} style={{ position: "absolute", top: 0, left: k * drag.w, width: drag.w, height: 300, display: "flex", justifyContent: "center" }}>
                  <img src={u} alt="" style={{ width: 320, maxWidth: "100%", height: 300, display: "block" }} />
                </div>
              ))}
            </div>
          )}
        </div>
        

        {/* page nav：4つの器スロット */}
        <div style={{ ...s.dots, touchAction: "none" }}
          onPointerDown={() => { dotHoldRef.current = setTimeout(openGoalMgr, 800); }}
          onPointerUp={() => clearTimeout(dotHoldRef.current)}
          onPointerCancel={() => clearTimeout(dotHoldRef.current)}
          onPointerLeave={() => clearTimeout(dotHoldRef.current)}
        >
          <button style={s.arrow} onClick={() => goRel(-1)}>‹</button>
          {slots.map((slot, i) => slot.type === "add"
            ? <button key={"a" + i} onClick={() => setPage(i)} style={{ ...s.dotPlus, ...(i === slotPos ? { borderColor: T.gold, color: T.gold } : {}) }}>＋</button>
            : <button key={slot.gi} onClick={() => setPage(i)} style={{ ...s.dot, ...(i === slotPos ? s.dotOn : {}) }} />
          )}
          <button style={s.arrow} onClick={() => goRel(1)}>›</button>
        </div>
        {onAdd && <div style={s.addHint}>{addKind === "first" ? <>ひと粒ずつ積もって、<br />なりたい自分になっていく。</> : <>器は最大4つ。<br />並べて、同時に育てられる。</>}</div>}
        {onAdd && <div style={{ flex: 1 }} />}

        {hasGoal && (<div style={{ ...s.todayBand, gap: compact === 2 ? 0 : compact === 1 ? 4 : 10 }}>
        {/* 日送り（プロト検証用）。DEV のときだけ表示 */}
        {DEV && <div style={{ ...s.dayRow, marginBottom: compact === 2 ? -12 : compact === 1 ? -10 : -6 }}>
          <span style={s.dayLab}>{(() => { const d = new Date(); d.setDate(d.getDate() + dayOffset); return `${d.getMonth() + 1}/${d.getDate()}（${WD[d.getDay()]}）${dayOffset === 0 ? "・今日" : ""}`; })()}</span>
          {dayOffset !== 0 && <button style={s.dayBtn} onClick={() => setDayOffset(0)}>今日に戻す</button>}
          <button style={s.dayBtn} onClick={() => setDayOffset((o) => o + 1)}>翌日へ →</button>
        </div>}

        {/* habits */}
        {g.habits.length === 0 ? (
          <div style={s.noHabits}>
            <div style={s.noHabitsTxt}>まだ習慣がない。<br />「{g.name}」に近づく小さな行動を足そう。</div>
            <button style={s.addCell} onClick={openAdd}><Plus size={28} color={T.gold} strokeWidth={2} /></button>
            <span style={s.cellLabel}>習慣を追加</span>
          </div>
        ) : (
        <div style={{ ...s.habits, gap: compact === 2 ? 2 : compact === 1 ? 3 : 4 }}>
          <div style={{ ...s.grid, gap: compact === 2 ? 3 : compact === 1 ? 6 : 12, minHeight: 220, justifyContent: "center", position: "relative" }}>
          {habitRows.map((row, ri) => {
            const spread = row.length === 2 && habitRows.length === 1; // 2個1行のときだけ左右に広げる
            return (
            <div key={ri} style={spread
              ? { ...s.gridRow, width: "100%", justifyContent: "space-evenly" }
              : { ...s.gridRow, gap: compact === 2 ? "0 24px" : compact === 1 ? "0 32px" : "0 40px" }}>
              {row.map((it) => it.add ? (
                <div key="add" style={{ ...s.cell, width: cellSize.w, gap: cellSize.gap, animation: "cellIn .58s cubic-bezier(.2,.8,.3,1) both" }}>
                  <button style={{ ...s.addCell, width: cellSize.D, height: cellSize.D }} onClick={openAdd}><Plus size={Math.round(cellSize.icon)} color={T.gold} strokeWidth={2} /></button>
                  <span style={s.cellLabel}>追加</span>
                </div>
              ) : renderHabitCell(it.h, it.i, cellSize))}
            </div>
            );
          })}
          </div>
          <div style={s.habitToolsFloat}>
            <button style={{ ...s.editIcon, ...(editMode ? s.editIconOn : {}) }} onClick={() => setEditMode((m) => !m)} aria-label={editMode ? "完了" : "習慣を編集"}>
              {editMode ? <Check size={15} color="#0B0C10" strokeWidth={3} /> : <Pencil size={14} color={T.lo} strokeWidth={2.2} />}
            </button>
          </div>
        </div>
        )}
        </div>)}
      </div>

      {/* 記録カレンダー（裏面の編集アイコン長押しで開く。○✕をあとから編集） */}
      {cal && (() => {
        const cg = goals[cal.gi]; const ch = cg && cg.habits[cal.i];
        if (!cg || !ch) return null;
        const cL = logs[cg.id + ":" + ch.id];
        const { y, m } = cal.ym;
        const daysInMonth = new Date(Date.UTC(y, m + 1, 0)).getUTCDate();
        const firstDn = dateToDay(y, m, 1);
        const lead = (dayToDate(firstDn).getUTCDay() + 6) % 7; // 月曜始まりの先頭空き
        const cells = []; for (let k = 0; k < lead; k++) cells.push(null);
        for (let d = 0; d < daysInMonth; d++) cells.push(firstDn + d);
        const col = `rgb(${ch.c.join(",")})`;
        const lum = 0.299 * ch.c[0] + 0.587 * ch.c[1] + 0.114 * ch.c[2];
        const onCol = lum > 150 ? "#0B0C10" : "#FFFFFF";
        const base = { display: "flex", alignItems: "center", justifyContent: "center", aspectRatio: "1", borderRadius: "50%", fontSize: 14, fontWeight: 700, fontFamily: "ui-monospace, monospace", boxSizing: "border-box", padding: 0, background: "transparent" };
        return (
          <div style={{ ...s.overlay, zIndex: 70 }} onClick={() => setCal(null)}>
            <div style={{ ...s.modal, gap: 14, maxWidth: 360, maxHeight: "92vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
                <div style={{ width: 54, height: 54, borderRadius: "50%", background: col, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  {ch.emoji ? <span style={{ fontSize: 26, lineHeight: 1 }}>{ch.emoji}</span> : <ch.Icon size={26} color={onCol} strokeWidth={2.2} />}
                </div>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.hi, textAlign: "center" }}>{ch.name}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <button onClick={() => calShift(-1)} aria-label="前の月" style={s.calNav}>‹</button>
                <div style={{ fontSize: 17, fontWeight: 700, color: T.hi }}>{y}年{m + 1}月</div>
                <button onClick={() => calShift(1)} aria-label="次の月" style={s.calNav}>›</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 }}>
                {["月", "火", "水", "木", "金", "土", "日"].map((w) => (
                  <div key={w} style={{ textAlign: "center", fontSize: 12, color: T.lo, fontWeight: 600 }}>{w}</div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 }}>
                {cells.map((dn, idx) => {
                  if (dn == null) return <div key={"e" + idx} />;
                  const stt = calCellState(ch, cL, dn);
                  const isToday = dn === day, future = dn > day, past = dn < day;
                  const num = dayToDate(dn).getUTCDate();
                  if (stt === "done") {
                    return <button key={dn} onClick={() => toggleDay(cal.gi, cal.i, dn)} style={{ ...base, background: col, color: onCol, border: isToday ? `2px solid ${T.hi}` : "2px solid transparent", cursor: "pointer" }}>{num}</button>;
                  }
                  if (stt === "miss" && past) { // 過去の未実施だけ✕
                    return <button key={dn} onClick={() => toggleDay(cal.gi, cal.i, dn)} style={{ ...base, border: "2px solid transparent", cursor: "pointer" }} aria-label={`${num}日 未実施`}><span style={{ fontSize: 18, fontWeight: 800, color: T.lo }}>✕</span></button>;
                  }
                  // 空欄＝薄い丸（週◯回の未達・習慣作成前・今日の未実施・未来）
                  return <button key={dn} disabled={future} onClick={() => { if (!future) toggleDay(cal.gi, cal.i, dn); }} style={{ ...base, color: future ? T.lo2 : T.lo, border: isToday ? `2px solid ${col}` : `1.5px solid ${T.hair2}`, opacity: future ? 0.45 : 0.9, cursor: future ? "default" : "pointer" }}>{num}</button>;
                })}
              </div>
              <button onClick={() => setCal(null)} style={{ ...s.create, background: col, color: onCol }}>完了</button>
            </div>
          </div>
        );
      })()}

      {/* 器管理オーバーレイ（dotsバー長押しで開く） */}
      {goalMgr && (
        <div style={{ ...s.overlay, zIndex: 65 }} onClick={() => setGoalMgr(false)}>
          <div style={{ ...s.modal, gap: 12 }} onClick={(e) => e.stopPropagation()}>
            <div style={s.mTitle}>器を並べ替え</div>
            <div style={s.mSub}>上下のボタンで順番を入れ替え。削除すると粒の記録も消えます。</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {slots.map((slot, i) => {
                const isGoal = slot.type === "goal";
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, background: T.surface, border: `1px solid ${T.hair}`, borderRadius: 12, padding: "8px 10px" }}>
                    {gmSnaps[i]
                      ? <img src={gmSnaps[i]} alt="" draggable={false} style={{ width: 44, height: 42, objectFit: "cover", flexShrink: 0 }} />
                      : <div style={{ width: 44, height: 42, flexShrink: 0 }} />
                    }
                    <div style={{ flex: 1, minWidth: 0, fontSize: 13, fontWeight: 600, color: isGoal ? T.hi : T.lo2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {isGoal ? goals[slot.gi].name : "空き"}
                    </div>
                    {isGoal && (<>
                      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                        <button disabled={i === 0} onClick={() => swapGoalSlots(i, i - 1)}
                          style={{ background: "transparent", border: `1px solid ${T.hair2}`, borderRadius: 8, width: 30, height: 22, display: "flex", alignItems: "center", justifyContent: "center", cursor: i === 0 ? "default" : "pointer", opacity: i === 0 ? 0.3 : 1, padding: 0 }} aria-label="上へ">
                          <ChevronUp size={15} color={T.hi} strokeWidth={2.4} />
                        </button>
                        <button disabled={i >= activeIdx.length - 1} onClick={() => swapGoalSlots(i, i + 1)}
                          style={{ background: "transparent", border: `1px solid ${T.hair2}`, borderRadius: 8, width: 30, height: 22, display: "flex", alignItems: "center", justifyContent: "center", cursor: i >= activeIdx.length - 1 ? "default" : "pointer", opacity: i >= activeIdx.length - 1 ? 0.3 : 1, padding: 0 }} aria-label="下へ">
                          <ChevronDown size={15} color={T.hi} strokeWidth={2.4} />
                        </button>
                      </div>
                      <button onClick={() => setGmConfirm({ gi: slot.gi, name: goals[slot.gi].name })}
                        style={{ background: "transparent", border: `1px solid rgba(220,60,60,0.35)`, borderRadius: 999, padding: "4px 10px", fontSize: 11, color: "rgba(220,80,80,0.85)", cursor: "pointer", flexShrink: 0 }}>削除</button>
                    </>)}
                  </div>
                );
              })}
            </div>
            <button style={{ ...s.back, alignSelf: "stretch", marginTop: 4 }} onClick={() => setGoalMgr(false)}>閉じる</button>
          </div>
        </div>
      )}

      {/* 器の削除確認 */}
      {gmConfirm && (
        <div style={{ ...s.overlay, zIndex: 80 }} onClick={() => setGmConfirm(null)}>
          <div style={{ ...s.modal, gap: 14, textAlign: "center", maxWidth: 320 }} onClick={(e) => e.stopPropagation()}>
            <div style={s.mTitle}>本当に削除しますか？</div>
            <div style={s.mSub}>「{gmConfirm.name}」と、積んだ粒の記録がすべて消えます。これは元に戻せません。</div>
            <div style={s.navRow}>
              <button style={{ ...s.back, flex: 1 }} onClick={() => setGmConfirm(null)}>やめる</button>
              <button style={{ ...s.create, flex: 1, background: "rgba(220,60,60,0.9)", color: "#fff" }}
                onClick={() => { deleteGoalAt(gmConfirm.gi); setGmConfirm(null); }}>削除する</button>
            </div>
          </div>
        </div>
      )}

      {/* 初回イントロ（4枚：概念→練習→哲学→ゴール） */}
      {showIntro && (
        <div style={{ ...s.overlay, zIndex: 70 }}>
          <div style={{ ...s.modal, alignItems: "center", textAlign: "center", maxWidth: 360, gap: 12, maxHeight: "92vh", overflowY: "auto" }}>
            <div style={s.steps}>{[0, 1, 2, 3].map((n) => <span key={n} style={{ ...s.stepDot, ...(n <= introStep ? s.stepOn : {}) }} />)}</div>
            {introStep === 0 && (<>
              <div style={{ margin: "2px 0" }}><MiniOrb colors={[]} size={132} done={false} /></div>
              <div style={s.introLabel}>GrainME</div>
              <div style={s.introTitle}>なりたい自分を、器に。</div>
              <div style={s.introBody}>「なりたい自分」をひとつ決めます。たとえば「いい体の自分」。それが、からっぽの器になります。</div>
            </>)}
            {introStep === 1 && (<>
              <div style={{ margin: "2px 0" }}><MiniOrb colors={[[128, 142, 174]]} size={132} done={false} /></div>
              <div style={s.introTitle}>やったら、長押し。</div>
              <div style={s.introBody}>なりたい自分がやっていそうな習慣を登録します。習慣ができたらボタンを長押しすると、器に粒がひとつ落ちます。</div>
            </>)}
            {introStep === 2 && (<>
              <div style={{ margin: "2px 0" }}><MiniOrb colors={INTRO_GRAINS} size={132} done /></div>
              <div style={s.introTitle}>粒は、あなたの行動。</div>
              <div style={s.introBody}>一粒一粒が、あなたの行動そのものです。積もった粒が、なりたい自分の一部になっている。</div>
            </>)}
            {introStep === 3 && (<>
              <div style={{ margin: "2px 0" }}><MiniOrb colors={INTRO_GRAINS} size={132} done /></div>
              <div style={s.introTitle}>満ちた時には、理想の自分になっている。</div>
              <div style={s.introBody}>器が粒でいっぱいになったら達成。「なれた自分」として、コレクションに並びます。</div>
            </>)}
            <button style={{ ...s.create, alignSelf: "stretch" }} onClick={() => introStep < 3 ? setIntroStep(introStep + 1) : dismissIntro()}>{introStep < 3 ? "次へ" : "はじめる"}</button>
            <button style={s.introSkip} onClick={() => introStep > 0 ? setIntroStep(introStep - 1) : dismissIntro()}>{introStep > 0 ? "もどる" : "スキップ"}</button>
          </div>
        </div>
      )}

      {/* create wizard */}
      {wiz && (
        <div style={s.overlay} onClick={() => setWiz(null)}>
          <div style={s.modal} onClick={(e) => e.stopPropagation()}>
            {wiz.step <= 1 && <div style={s.steps}>{[0, 1].map((n) => <span key={n} style={{ ...s.stepDot, ...(n <= wiz.step ? s.stepOn : {}) }} />)}</div>}

            {wiz.step === 0 && (
              <>
                <div style={s.mTitle}>どうなりたい？</div>
                <div style={s.mSub}>3週間後でも1年後でもいい。なりたい自分を一言で。</div>
                <input style={s.input} autoFocus value={wiz.name} placeholder="例：いい体の自分"
                  onChange={(e) => setWiz((w) => ({ ...w, name: e.target.value }))} />
                <button style={{ ...s.create, opacity: wiz.name.trim() ? 1 : 0.4 }} disabled={!wiz.name.trim()}
                  onClick={() => setWiz((w) => ({ ...w, step: 1 }))}>次へ</button>
              </>
            )}

            {wiz.step === 1 && (

      {/* collection item detail */}

      {/* goal detail page */}
      {goalDetail !== null && (() => {
        const gi = goalDetail, gg = goals[gi];
        const colors = (ballsBy.current[gg.id] || []).map((b) => b.c);
        const cntD = colors.length, capD = capOf(gg), pct = capD ? Math.min(100, Math.round(cntD / capD * 100)) : 0, remain = Math.max(0, capD - cntD);
        const doneD = capD > 0 && cntD >= capD;
        // この調子で何日：理想ペースではなく、直近14日の“実際に積んだ”ペースで見積もる
        const ESTWIN = 14, winFrom = day - ESTWIN + 1;
        let recentGrains = 0;
        gg.habits.forEach((h) => { const L = logs[gg.id + ":" + h.id]; if (L?.hist) Object.entries(L.hist).forEach(([dd, c]) => { if (+dd >= winFrom && +dd <= day) recentGrains += c; }); });
        const earliestStart = gg.habits.reduce((m, h) => Math.min(m, h.startDay || 0), day);
        const obsDays = Math.max(1, Math.min(ESTWIN, day - earliestStart + 1)); // 観測できた日数（ゴールが若ければそのぶん短く）
        const recentPace = recentGrains / obsDays;
        const estDays = recentPace > 0 ? Math.ceil(remain / recentPace) : null; // 直近ゼロなら見積もり不能＝「—」
        const freqLabel = (h) => { const m = h.fmode || "daily"; const pd = Math.max(1, h.perDay || 1); let b = m === "week" ? `週${h.perWeek || 3}回` : m === "days" ? ((h.days || []).map((d) => WD[d]).join("") || "曜日") : "毎日"; if (pd > 1) b += `・1日${pd}回`; return b; };
        const typeLabel = (h) => h.type === "neg" ? "やめる" : h.type === "timed" ? `${h.min || 5}分` : null;
        const start = Math.max(0, day - 13); const ratePts = [];
        for (let d = start; d <= day; d++) {
          let act = 0, exp = 0;
          gg.habits.forEach((h, i) => { const sd = h.startDay || 0; if (d < sd) return; const L = logs[gg.id + ":" + h.id]; if (L?.hist) Object.entries(L.hist).forEach(([dd, c]) => { if (+dd <= d) act += c; }); exp += pace([h]) * (d - sd + 1); });
          ratePts.push({ d, r: exp > 0 ? Math.min(100, act / exp * 100) : 0 });
        }
        const overallRate = ratePts.length ? Math.round(ratePts.reduce((s, p) => s + p.r, 0) / ratePts.length) : 0;
        // 曜日別粒数（日=0..土=6）
        const DOW_LABELS = ["日", "月", "火", "水", "木", "金", "土"];
        const dowCounts = [0, 0, 0, 0, 0, 0, 0];
        gg.habits.forEach((h) => {
          const L = logs[gg.id + ":" + h.id];
          if (!L?.hist) return;
          Object.entries(L.hist).forEach(([dd, c]) => {
            const absDay = +dd;
            // todayNum() は 1970-01-01 から日数+4。日付を復元して曜日取得
            const ms = (absDay - 4) * 86400000;
            const dow = new Date(ms).getUTCDay();
            dowCounts[dow] += c;
          });
        });
        const dowMax = Math.max(1, ...dowCounts);

        // 習慣ごと推移グラフ：移動平均方式（開始日〜今日全表示、nはその日までの経過日数）
        const habitRatePts = (h) => {
          const sd = h.startDay || 0;
          const L = logs[gg.id + ":" + h.id];
          const histByDay = {};
          if (L?.hist) Object.entries(L.hist).forEach(([dd, c]) => { histByDay[+dd] = c; });
          const p = pace([h]);
          const pts = [];
          for (let d = sd; d <= day; d++) {
            const n = d - sd + 1;
            let completedDays = 0;
            for (let k = sd; k <= d; k++) {
              const c = histByDay[k] || 0;
              completedDays += p > 0 ? Math.min(1, c / p) : 0;
            }
            pts.push({ d, r: Math.min(100, completedDays / n * 100) });
          }
          return pts;
        };

        const totalPages = 1 + gg.habits.length;
        const dp = Math.min(detailPage, totalPages - 1);
        dDragRef.current = { total: totalPages };

        // SVGグラフ共通
        const GCW = 300, GCH = 80, GPX = 6, GPY = 8;
        const gXof = (i, n) => GPX + (n <= 1 ? (GCW - 2 * GPX) / 2 : i / (n - 1) * (GCW - 2 * GPX));
        const gYof = (r) => GCH - GPY - (r / 100) * (GCH - 2 * GPY);
        const makeLinePts = (pts) => pts.map((p, i) => `${gXof(i, pts.length).toFixed(1)},${gYof(p.r).toFixed(1)}`).join(" ");
        const makeAreaPts = (pts) => { const lp = makeLinePts(pts); const n = pts.length; return `${gXof(0, n).toFixed(1)},${GCH - GPY} ${lp} ${gXof(n - 1, n).toFixed(1)},${GCH - GPY}`; };
        const dateLabel = (absDay) => { const dt = new Date(); dt.setDate(dt.getDate() + (absDay - now)); return `${dt.getMonth() + 1}/${dt.getDate()}`; };

        return (
          <div style={s.overlay} onClick={() => setGoalDetail(null)}>
            <div style={{ ...s.modal, maxHeight: "88vh", overflowY: "hidden", padding: 0 }} onClick={(e) => e.stopPropagation()}>

              {/* ヘッダー：器名 + ページドット */}
              <div style={{ padding: "18px 20px 12px", borderBottom: `1px solid ${T.hair}` }}>
                <div style={{ textAlign: "center", marginBottom: 10 }}>
                  <div style={s.idLabel}>{doneD ? "なれた自分" : "なりたい自分"}</div>
                  <div style={{ ...s.mTitle, fontSize: 19, marginTop: 2, color: doneD ? T.gold : T.hi }}>{gg.name}</div>
                </div>
                {/* ページインジケーター */}
                <div style={{ display: "flex", justifyContent: "center", gap: 6 }}>
                  {Array.from({ length: totalPages }).map((_, i) => (
                    <button key={i} onClick={() => setDetailPage(i)} style={{ width: i === dp ? 18 : 7, height: 7, borderRadius: 999, background: i === dp ? T.gold : T.hair2, border: "none", padding: 0, cursor: "pointer", transition: "width .2s, background .2s" }} />
                  ))}
                </div>
              </div>

              {/* スクロール本体（横スワイプでページ送り） */}
              <div
                key={dp}
                ref={(el) => {
                  if (!el || el._swipeBound) return;
                  el._swipeBound = true;
                  let sx = 0, sy = 0, decided = null, dxv = 0;
                  el.addEventListener("touchstart", (e) => {
                    const t = e.touches[0]; sx = t.clientX; sy = t.clientY; decided = null; dxv = 0;
                  }, { passive: true });
                  el.addEventListener("touchmove", (e) => {
                    const t = e.touches[0];
                    const dx = t.clientX - sx, dy = t.clientY - sy;
                    if (decided == null) {
                      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
                      decided = Math.abs(dx) > Math.abs(dy) * 1.3 ? "h" : "v";
                    }
                    if (decided === "h") { dxv = dx; e.preventDefault(); }
                  }, { passive: false });
                  el.addEventListener("touchend", () => {
                    if (decided === "h") {
                      const tot = dDragRef.current.total;
                      if (dxv < -50) setDetailPage((p) => (p + 1) % tot);
                      else if (dxv > 50) setDetailPage((p) => (p - 1 + tot) % tot);
                    }
                    decided = null;
                  });
                }}
                style={{ overflowY: "auto", overflowX: "hidden", padding: "16px 20px 16px", display: "flex", flexDirection: "column", gap: 14, maxHeight: "calc(88vh - 160px)", animation: "dpSlide .26s cubic-bezier(.22,1,.3,1)" }}
              >

                {dp === 0 ? (
                  /* ── p.0 全体サマリー ── */
                  <>
                    {/* 進捗バー */}
                    <div style={s.gdProg}>
                      <div style={s.gdBarBg}><div style={{ ...s.gdBarFill, width: pct + "%", background: doneD ? T.gold : "rgba(190,214,242,0.85)" }} /></div>
                      <div style={s.gdProgRow}><span>{cntD} / {capD} 粒</span><span>{pct}%</span></div>
                    </div>
                    {/* 3統計 */}
                    <div style={s.gdStats}>
                      <div style={s.gdStat}><div style={s.gdStatN}>{remain}</div><div style={s.gdStatL}>のこり粒</div></div>
                      <div style={s.gdStat}><div style={s.gdStatN}>{doneD ? "—" : (estDays != null ? `約${estDays}` : "—")}</div><div style={s.gdStatL}>この調子で日</div></div>
                      <div style={s.gdStat}><div style={{ ...s.gdStatN, color: T.gold }}>{overallRate}%</div><div style={s.gdStatL}>平均達成率</div></div>
                    </div>
                    {/* 達成率の推移（折れ線） */}
                    <div>
                      <label style={s.lab}>達成率の推移</label>
                      <div style={s.chartWrap}>
                        <svg viewBox={`0 0 ${GCW} ${GCH}`} style={{ width: "100%", display: "block" }}>
                          <line x1={GPX} y1={gYof(100)} x2={GCW - GPX} y2={gYof(100)} stroke={T.hair2} strokeWidth="1" />
                          <line x1={GPX} y1={gYof(50)} x2={GCW - GPX} y2={gYof(50)} stroke={T.hair} strokeWidth="1" strokeDasharray="3 4" />
                          <polygon points={makeAreaPts(ratePts)} fill={`${T.gold}1f`} />
                          <polyline points={makeLinePts(ratePts)} fill="none" stroke="rgb(201,162,74)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                          {ratePts.length > 0 && <circle cx={gXof(ratePts.length - 1, ratePts.length)} cy={gYof(ratePts[ratePts.length - 1].r)} r="3.2" fill="rgb(201,162,74)" />}
                        </svg>
                        <div style={s.chartFoot}><span>{dateLabel(start)}</span><span>{dayOffset === 0 ? "今日" : dateLabel(day)}</span></div>
                      </div>
                    </div>
                    {/* 曜日別粒数（棒グラフ） */}
                    <div>
                      <label style={s.lab}>曜日別の粒数</label>
                      <div style={s.chartWrap}>
                        <svg viewBox="0 0 300 72" style={{ width: "100%", display: "block" }}>
                          {DOW_LABELS.map((lbl, i) => {
                            const bw = 26, gap = (300 - 7 * bw) / 8, x = gap + i * (bw + gap);
                            const barH = dowCounts[i] / dowMax * 48;
                            const isToday = new Date().getDay() === i;
                            const col = isToday ? "rgb(201,162,74)" : T.hair2;
                            const barFill = isToday ? "rgb(201,162,74)" : `rgba(${T.hi === "#F2EFE9" ? "242,239,233" : "100,110,130"},0.35)`;
                            return (
                              <g key={i}>
                                <rect x={x} y={56 - barH} width={bw} height={Math.max(barH, 2)} rx="4" fill={barFill} />
                                <text x={x + bw / 2} y={70} textAnchor="middle" fontSize="10" fill={col} fontFamily="ui-monospace, monospace">{lbl}</text>
                              </g>
                            );
                          })}
                        </svg>
                      </div>
                    </div>
                  </>
                ) : (
                  /* ── p.1〜n 習慣ごと ── */
                  (() => {
                    const h = gg.habits[dp - 1];
                    if (!h) return null;
                    const L = logs[gg.id + ":" + h.id] || {};
                    const hCnt = (ballsBy.current[gg.id] || []).filter((b) => b.hid === h.id).length;
                    const si = streakInfo(h, L, day);
                    const tl = typeLabel(h);
                    const hPts = habitRatePts(h);
                    const hRate = hPts.length ? Math.round(hPts[hPts.length - 1].r) : 0;
                    const hStartDay = h.startDay || 0;
                    const hMidDay = Math.round((hStartDay + day) / 2);
                    // この習慣の曜日別粒数
                    const hDow = [0, 0, 0, 0, 0, 0, 0];
                    if (L.hist) Object.entries(L.hist).forEach(([dd, c]) => { const dw = new Date((+dd - 4) * 86400000).getUTCDay(); hDow[dw] += c; });
                    const hDowMax = Math.max(1, ...hDow);
                    return (
                      <>
                        {/* 習慣ヘッダー */}
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                          <div style={{ width: 44, height: 44, borderRadius: "50%", background: T.surface2, border: `2px solid rgb(${h.c.join(",")})`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            {h.emoji ? <span style={{ fontSize: 22 }}>{h.emoji}</span> : <h.Icon size={20} color={`rgb(${h.c.join(",")})`} strokeWidth={2.2} />}
                          </div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={s.gdHName}>{h.name}</div>
                            <div style={s.gdHSub}>{freqLabel(h)}{tl ? "・" + tl : ""}</div>
                          </div>
                          <span style={s.compN}>{hCnt}粒</span>
                        </div>
                        {/* 3統計 */}
                        <div style={s.gdStats}>
                          <div style={s.gdStat}><div style={{ ...s.gdStatN, color: T.gold }}>{hRate}%</div><div style={s.gdStatL}>達成率</div></div>
                          <div style={s.gdStat}><div style={s.gdStatN}>{si.cur}<span style={{ fontSize: 13 }}>{si.unit}</span></div><div style={s.gdStatL}>現在のストリーク</div></div>
                          <div style={s.gdStat}><div style={{ ...s.gdStatN, color: T.gold }}>{si.best}<span style={{ fontSize: 13 }}>{si.unit}</span></div><div style={s.gdStatL}>最高ストリーク</div></div>
                        </div>
                        {/* 達成率の推移 */}
                        <div>
                          <label style={s.lab}>達成率の推移</label>
                          <div style={s.chartWrap}>
                            <svg viewBox={`0 0 ${GCW} ${GCH}`} style={{ width: "100%", display: "block" }}>
                              <line x1={GPX} y1={gYof(100)} x2={GCW - GPX} y2={gYof(100)} stroke={T.hair2} strokeWidth="1" />
                              <line x1={GPX} y1={gYof(50)} x2={GCW - GPX} y2={gYof(50)} stroke={T.hair} strokeWidth="1" strokeDasharray="3 4" />
                              <polygon points={makeAreaPts(hPts)} fill={`rgba(${h.c.join(",")},0.12)`} />
                              <polyline points={makeLinePts(hPts)} fill="none" stroke={`rgb(${h.c.join(",")})`} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                              {hPts.length > 0 && <circle cx={gXof(hPts.length - 1, hPts.length)} cy={gYof(hPts[hPts.length - 1].r)} r="3.2" fill={`rgb(${h.c.join(",")})`} />}
                            </svg>
                            <div style={{ ...s.chartFoot, justifyContent: "space-between" }}>
                              <span>{dateLabel(hStartDay)}</span>
                              <span style={{ color: T.lo2 }}>{dateLabel(hMidDay)}</span>
                              <span>{dayOffset === 0 ? "今日" : dateLabel(day)}</span>
                            </div>
                          </div>
                        </div>
                        {/* 曜日別の粒数 */}
                        <div>
                          <label style={s.lab}>曜日別の粒数</label>
                          <div style={s.chartWrap}>
                            <svg viewBox="0 0 300 72" style={{ width: "100%", display: "block" }}>
                              {DOW_LABELS.map((lbl, i) => {
                                const bw = 26, gap = (300 - 7 * bw) / 8, x = gap + i * (bw + gap);
                                const barH = hDow[i] / hDowMax * 48;
                                const isToday = new Date().getDay() === i;
                                const hcol = `rgb(${h.c.join(",")})`;
                                const barFill = hDow[i] > 0 ? `rgba(${h.c.join(",")},${isToday ? 1 : 0.55})` : T.hair2;
                                return (
                                  <g key={i}>
                                    <rect x={x} y={56 - barH} width={bw} height={Math.max(barH, 2)} rx="4" fill={barFill} />
                                    <text x={x + bw / 2} y={70} textAnchor="middle" fontSize="10" fill={isToday ? hcol : T.lo} fontFamily="ui-monospace, monospace">{lbl}</text>
                                  </g>
                                );
                              })}
                            </svg>
                          </div>
                        </div>
                      </>
                    );
                  })()
                )}
              </div>

              {/* フッターボタン */}
              <div style={{ padding: "12px 20px 16px", borderTop: `1px solid ${T.hair}` }}>
                <div style={s.navRow}>
                  <button style={{ ...s.back, flex: 1 }} onClick={() => { setGoalDetail(null); setPage(Math.max(0, activeIdx.indexOf(gi))); setEditList(true); }}>ゴールを編集</button>
                  <button style={{ ...s.create, flex: 1 }} onClick={() => setGoalDetail(null)}>閉じる</button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* 習慣ドラッグ中、指に追従する複製（ゴースト） */}
      {ghost && (
        <div ref={ghostRef} style={{ position: "fixed", left: 0, top: 0, zIndex: 90, pointerEvents: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, willChange: "transform", transform: `translate(${ghost.x}px, ${ghost.y}px) translate(-50%, -50%)` }}>
          <div style={{ width: 78, height: 78, borderRadius: "50%", background: T.surface2, border: `2px solid ${ghost.col}`, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 14px 30px rgba(0,0,0,0.45)", transform: "scale(1.08)" }}>
            {ghost.emoji ? <span style={{ fontSize: 27, lineHeight: 1 }}>{ghost.emoji}</span> : <ghost.Icon size={26} color={ghost.col} strokeWidth={2.2} />}
          </div>
          <span style={{ ...s.cellLabel, opacity: 0.9 }}>{ghost.name}</span>
        </div>
      )}
    </div>
  );
}

function MiniOrb({ colors, size = 96, done = true, goldColor = "#C9A24A" }) {
  const mgId = useRef("mg_" + uid()).current;
  const cx = size / 2, cy = size / 2, R = size / 2 - 5;
  const n = Math.min(colors.length, 30);
  const dots = [];
  for (let i = 0; i < n; i++) {
    const a = i * 2.39996, r = (R - 6) * Math.sqrt(i / Math.max(n, 1));
    const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
    const c = colors[Math.floor(i / n * colors.length)] || [200, 200, 200];
    dots.push(<circle key={i} cx={x} cy={y} r={3.1} fill={`rgb(${c.join(",")})`} opacity="0.9" />);
  }
  const rim = done ? `${goldColor}80` : "rgba(255,255,255,0.18)";
  const glow = done ? goldColor : "#BFD6F2";
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs><radialGradient id={mgId}><stop offset="0%" stopColor={glow} stopOpacity="0.22" /><stop offset="100%" stopColor={glow} stopOpacity="0" /></radialGradient></defs>
      <circle cx={cx} cy={cy} r={R + 4} fill={`url(#${mgId})`} />
      <circle cx={cx} cy={cy} r={R} fill="rgba(255,255,255,0.02)" stroke={rim} strokeWidth="1.2" />
      {dots}
    </svg>
  );
}
