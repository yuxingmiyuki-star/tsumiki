/* ── リマインダー：ネイティブ通知ブリッジ ──────────────────────────────
   ネイティブ化（Capacitor / RN webview 等）した際、実機側が時刻通知を鳴らす。
   実機側は window.TsumikiNative に下記3メソッドを実装するだけでよい：
     reminderPermission(): Promise<boolean>
     scheduleReminder({ id:number, key:string, title:string, body:string,
                        hour:number, minute:number, weekdays:number[] }): Promise<void>
        ・weekdays は 0=日…6=土。空配列なら毎日。id は同一なら上書き（再スケジュール）。
     cancelReminder(id:number): Promise<void>
   ブリッジが無い環境（このプロトタイプ／ブラウザ）では全メソッドが安全に no-op。 */
const Reminders = {
  bridge() { try { return (typeof window !== "undefined" && window.TsumikiNative) || null; } catch { return null; } },
  notifId(key) { let h = 0; for (let i = 0; i < key.length; i++) h = (Math.imul(h, 31) + key.charCodeAt(i)) | 0; return (h >>> 0) % 2000000000 + 1; },
  async permission() { const b = this.bridge(); if (!b?.reminderPermission) return false; try { return !!(await b.reminderPermission()); } catch { return false; } },
  async schedule(key, { title, body, time, weekdays }) {
    const b = this.bridge(); if (!b?.scheduleReminder) return;
    const [hh, mm] = String(time || "08:00").split(":").map((n) => parseInt(n, 10) || 0);
    try { await b.scheduleReminder({ id: this.notifId(key), key, title, body, hour: hh, minute: mm, weekdays: weekdays || [] }); } catch {}
  },
  async cancel(key) { const b = this.bridge(); if (!b?.cancelReminder) return; try { await b.cancelReminder(this.notifId(key)); } catch {} },
};
// 習慣1つぶんのリマインダーを、remOn とゴールの状態に合わせて登録/解除する
const syncReminder = (goal, habit) => {
  if (!goal || !habit) return;
  const key = goal.id + ":" + habit.id;
  if (habit.remOn && !goal.graduated) {
    const mode = habit.fmode || "daily";
    const weekdays = mode === "days" ? (habit.days || []) : []; // 毎日/週まとめ は空＝毎日
    Reminders.schedule(key, { title: goal.name, body: `「${habit.name}」の時間`, time: habit.remTime || "08:00", weekdays });
  } else {
    Reminders.cancel(key);
  }
};

    setPage((p) => (Math.min(Math.max(p, 0), MAX_GOALS - 1) + d + MAX_GOALS) % MAX_GOALS);
  };
  // 器管理オーバーレイを開く（dotsバーの長押し）
  const openGoalMgr = () => {
    setGmSnaps(slots.map((slot) => slotSnap(slot)));
    setGoalMgr(true);
  };
  // 器の削除（実処理）。確認はアプリ内ダイアログ側で行う
  const deleteGoalAt = (gi) => {
    const goal = goals[gi]; if (!goal) return;
    goal.habits.forEach((h) => Reminders.cancel(goal.id + ":" + h.id));
    delete ballsBy.current[goal.id];
    const prefix = goal.id + ":";
    setLogs((m) => Object.fromEntries(Object.entries(m).filter(([k]) => !k.startsWith(prefix))));
    setGoals((gs) => gs.filter((_, k) => k !== gi));
    setPage(0);
  };
  // 器の順序入れ替え（スロット番号で指定）
  const swapGoalSlots = (fromSlot, toSlot) => {
    const fi = activeIdx[fromSlot], ti = activeIdx[toSlot];
    if (fi === undefined || ti === undefined || fi === ti) return;
    setGoals((gs) => { const a = [...gs]; [a[fi], a[ti]] = [a[ti], a[fi]]; return a; });
  };
  // 習慣の順序入れ替え（インデックスで指定）
  const swapHabits = (from, to) => {
    if (from === to || from == null || to == null) return;
    setGoals((gs) => gs.map((g, gi) => {
      if (gi !== curGi) return g;
      const a = [...g.habits]; [a[from], a[to]] = [a[to], a[from]]; return { ...g, habits: a };
    }));
  };
  // オーブを左右にドラッグ＝指に追従して隣のスロットが見える。離した方向にスナップ
  const onStageDown = (e) => { dragRef.current = { active: true, decided: null, startX: e.clientX, startY: e.clientY, x: 0 }; };
  const onStageMove = (e) => {
    const dr = dragRef.current; if (!dr || !dr.active) return;
    const dx = e.clientX - dr.startX, dy = e.clientY - dr.startY;
    if (dr.decided == null) {
      if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
      if (Math.abs(dy) >= Math.abs(dx) || MAX_GOALS < 2) { dr.decided = "v"; return; }
      const prevPos = (slotPos - 1 + MAX_GOALS) % MAX_GOALS;
      const nextPos = (slotPos + 1) % MAX_GOALS;
      const w = stageRef.current?.getBoundingClientRect().width || 320;
      const urls = [slotSnap(slots[prevPos]), slotSnap(slots[slotPos]), slotSnap(slots[nextPos])];
      if (urls.some((u) => !u)) { dr.decided = "v"; return; } // 画像化できない環境はドラッグ無効
      dr.decided = "h"; dr.w = w; dr.prevPos = prevPos; dr.nextPos = nextPos;
      try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
      setDrag({ urls, w });
      return;
    }
    if (dr.decided === "h" && trackRef.current) trackRef.current.style.transform = `translateX(${-dr.w + (dr.x = dx)}px)`;
  };
  const onStageUp = () => {
    const dr = dragRef.current; dragRef.current = null;
    if (!dr || dr.decided !== "h") return;
    const w = dr.w, x = dr.x || 0, tr = trackRef.current;
    const commit = x < -w * 0.22 ? 1 : x > w * 0.22 ? -1 : 0; // 22%超で確定
    const finish = () => { if (commit === 1) setPage(dr.nextPos); else if (commit === -1) setPage(dr.prevPos); requestAnimationFrame(() => requestAnimationFrame(() => setDrag(null))); };
    if (tr) {
      tr.style.transition = "transform .28s cubic-bezier(.22,1,.3,1)";
      tr.style.transform = `translateX(${commit === 1 ? -2 * w : commit === -1 ? 0 : -w}px)`;
      let done = false; const h = () => { if (done) return; done = true; tr.removeEventListener("transitionend", h); finish(); };
      tr.addEventListener("transitionend", h); setTimeout(h, 380);
    } else finish();
  };
  const onStageCancel = () => { if (dragRef.current?.decided === "h") { dragRef.current = null; setDrag(null); } else dragRef.current = null; };
  // 今日の各習慣の状態。week=週◯回（毎日は強制しない）、それ以外＝毎日・曜日（今日やるべき必須枠）
  const todayStatuses = hasGoal ? g.habits.map((h, i) => ({ st: habitStatus(curGi, i), week: (h.fmode || "daily") === "week" })) : [];
  const reqOpen = todayStatuses.some(({ st, week }) => st.ok && !week); // 毎日・曜日に未完が残っている
  const activeCount = todayStatuses.filter(({ st }) => !st.off).length; // 今日対象の習慣数（曜日で対象外のものは除く）
  const need = Math.round(activeCount / 2); // 半分（四捨五入）はこなす
  const doneCount = todayStatuses.filter(({ st }) => st.done).length; // 今日のぶんを済ませた数
  // 金色＝必須(毎日・曜日)を全部やったうえで、今日対象の習慣の半分以上をこなした
  const allClear = hasGoal && !full && activeCount > 0 && !reqOpen && doneCount >= need;
  allClearRef.current = allClear || full;
  // 最初の長押し案内：まだ一度も積んでおらず、今日押せる習慣があり、器が空のときだけ
  const showCoach = !coachSeen && !showIntro && hasGoal && cnt === 0 && g.habits.some((h, i) => habitStatus(curGi, i).ok);
  useEffect(() => { if (allClear && !lastClear.current) goldPing(); lastClear.current = allClear; }, [allClear]);

  // 習慣数で各部の余白・フォントを段階的に縮める（編集中は追加セルぶん+1として詰める）
  const hc = hasGoal ? g.habits.length : 0;
  const showAddCell = editMode && hc < MAX_HABITS; // 末尾に「追加」セルを出すか
  const hcEff = hc + (showAddCell ? 1 : 0); // レイアウト計算用の実効セル数
  const compact = hcEff >= 7 ? 2 : hcEff >= 4 ? 1 : 0; // 0=通常 1=中 2=詰め
  // 3個ずつの行に割る（端数行も中央寄せで見せるため、grid ではなく行ごとの flex で描く）
  const habitRows = (() => {
    const items = hasGoal ? g.habits.map((h, i) => ({ h, i })) : [];
    const list = showAddCell ? [...items, { add: true }] : items;
    const rows = [];
    for (let k = 0; k < list.length; k += 3) rows.push(list.slice(k, k + 3));
    return rows;
  })();
  const screenGap = compact === 2 ? 4 : compact === 1 ? 7 : 10;
  const idNameSize = compact === 2 ? 18 : compact === 1 ? 20 : 24;
  const idNameMT = compact === 2 ? 2 : compact === 1 ? 3 : 6;
  const idBlockPT = compact >= 1 ? 0 : 2;

  // 習慣セル1個を描く（行分割レイアウトから呼ぶ）
  const renderHabitCell = (h, i) => {
    const col = `rgb(${h.c.join(",")})`;
    const st = habitStatus(curGi, i); const dis = full || !st.ok;
    const L = logs[g.id + ":" + h.id]; const streak = streakInfo(h, L, day).cur;
    const mode = h.fmode || "daily";
    const dueT = mode === "days" ? (h.days || [0, 1, 2, 3, 4, 5, 6]).includes(((day % 7) + 7) % 7) : true;
    const tdc = L && L.day === day ? L.td : 0;
    const dt = dueT && tdc >= (mode === "week" ? 1 : Math.max(1, h.perDay || 1)); // 今日ぶん完了（週モードは1日1回で完了）
    const inactive = full || (!st.ok && !dt);
    const gold = dt && allClear; // 全部終わって金色
    const fillCol = gold ? `rgb(${GOLD_FILL.join(",")})` : `rgb(${h.c.join(",")})`;
    const type = h.type || "pos";
    const isTimed = type === "timed";
    const running = !!(timing && timing.key === (g.id + ":" + h.id));
    const btnDisabled = isTimed ? (full || (!st.ok && !running)) : dis;
    const handlers = isTimed ? { onClick: () => startTimer(i) } : { onPointerDown: down(i), onPointerUp: up, onPointerLeave: up, onPointerCancel: up };
    const perDay = mode === "week" ? 1 : Math.max(1, h.perDay || 1);
    const frac = dueT ? Math.min(tdc / perDay, 1) : 0; // 1日◯回の進捗
    const fc = gold ? GOLD_FILL : h.c;
    const onFillIcon = (0.299 * fc[0] + 0.587 * fc[1] + 0.114 * fc[2]) > 150 ? "#0B0C10" : "#F4F1EA"; // 塗りの上で見える色
    const timedHint = isTimed && st.ok && !dt && !running && !full; // ▶25
    return (
      <div key={h.id} ref={(el) => { if (el) habitCellRefs.current[h.id] = el; else delete habitCellRefs.current[h.id]; }} style={s.cell}>
        {hDragFrom === i ? (<>
          {/* 掴んでいる間の置き場所（点線の円） */}
          <div style={{ width: 78, height: 78, borderRadius: "50%", border: `2px dashed ${T.hair2}`, boxSizing: "border-box" }} />
          <span style={{ ...s.cellLabel, opacity: 0 }}>{h.name}</span>
        </>) : (<>
        <div style={{ position: "relative" }}>
          <button onContextMenu={(e) => e.preventDefault()} style={{ ...s.circleBtn, borderRadius: "50%", opacity: editMode ? 1 : (inactive ? 0.34 : 1), animation: gold ? "btnglow 1.8s ease-in-out infinite" : undefined, ...(editMode ? { cursor: hDragFrom !== null ? "grabbing" : "grab" } : {}), touchAction: editMode ? "none" : undefined }} disabled={editMode ? false : btnDisabled} {...(editMode ? {
            onPointerDown: (e) => {
              e.stopPropagation();
              const px = e.clientX, py = e.clientY;
              hHoldRef.current = setTimeout(() => {
                hDragFromRef.current = i; setHDragFrom(i);
                lastSwapRef.current = 0;
                setGhost({ Icon: h.Icon, emoji: h.emoji, name: h.name, col, x: px, y: py });
                try { navigator.vibrate && navigator.vibrate(8); } catch (err) {}
                // ドラッグ中はwindowで座標を拾う（セルのDOMが動いても取りこぼさない）
                const move = (ev) => {
                  const from = hDragFromRef.current; if (from === null) return;
                  const x = ev.clientX, y = ev.clientY;
                  if (ghostRef.current) ghostRef.current.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
                  if (Date.now() - lastSwapRef.current < 200) return; // 入れ替え直後はFLIPが終わるまで判定しない（振動防止）
                  const habits = goalsRef.current[curGi]?.habits || [];
                  let target = from, best = Infinity;
                  for (let k = 0; k < habits.length; k++) {
                    const el = habitCellRefs.current[habits[k].id]; if (!el) continue;
                    const r = el.getBoundingClientRect();
                    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
                    const d = Math.hypot(x - cx, y - cy);
                    if (d < best) { best = d; target = k; }
                  }
                  if (target !== from) { swapHabits(from, target); hDragFromRef.current = target; setHDragFrom(target); lastSwapRef.current = Date.now(); }
                };
                const end = () => {
                  window.removeEventListener("pointermove", move);
                  window.removeEventListener("pointerup", end);
                  window.removeEventListener("pointercancel", end);
                  hDragFromRef.current = null; setHDragFrom(null); setGhost(null);
                };
                window.addEventListener("pointermove", move, { passive: true });
                window.addEventListener("pointerup", end);
                window.addEventListener("pointercancel", end);
              }, 320);
            },
            onPointerUp: () => { if (hDragFromRef.current === null) { clearTimeout(hHoldRef.current); openEdit(i); } },
            onPointerLeave: () => { if (hDragFromRef.current === null) clearTimeout(hHoldRef.current); },
          } : handlers)}>
            <svg width="78" height="78" style={{ position: "absolute", inset: 0 }}>
              <circle cx="39" cy="39" r={RR} fill="none" stroke={dt ? fillCol : `rgba(${h.c.join(",")},0.28)`} strokeWidth="3" strokeDasharray={type === "neg" && !dt ? "4 4" : undefined} />
              {frac > 0 && frac < 1 && <path d={sectorPath(39, 39, RR - 1.5, frac)} fill={fillCol} />}
              {frac >= 1 && <circle cx="39" cy="39" r={RR - 1.5} fill={fillCol} />}
              {perDay > 1 && Array.from({ length: perDay }).map((_, k) => {
                const a = -Math.PI / 2 + k * (2 * Math.PI / perDay);
                return <line key={k} x1="39" y1="39" x2={39 + (RR - 1.5) * Math.cos(a)} y2={39 + (RR - 1.5) * Math.sin(a)} stroke="rgba(11,12,16,0.28)" strokeWidth="1.4" />;
              })}
              {held === i && !isTimed && <circle cx="39" cy="39" r={RR} fill="none" stroke={col} strokeWidth="3" strokeLinecap="round"
                strokeDasharray={CIRC} strokeDashoffset={CIRC} transform="rotate(-90 39 39)" style={{ animation: `fillring ${HOLD}ms linear forwards` }} />}
              {running && <circle cx="39" cy="39" r={RR} fill="none" stroke={col} strokeWidth="3" strokeLinecap="round"
                strokeDasharray={CIRC} strokeDashoffset={CIRC} transform="rotate(-90 39 39)" style={{ animation: `fillring ${timing.dur}ms linear forwards` }} />}
            </svg>
            {h.emoji
              ? <span style={{ position: "relative", fontSize: 26, lineHeight: 1, opacity: running ? 0.5 : 1 }}>{h.emoji}</span>
              : <h.Icon size={25} color={frac > 0 ? onFillIcon : col} strokeWidth={2.2} style={{ position: "relative", opacity: running ? 0.5 : 1, filter: frac > 0 && onFillIcon !== "#0B0C10" ? "drop-shadow(0 0.5px 1px rgba(0,0,0,0.35))" : "none" }} />}
          </button>
          {!editMode && streak > 0 && <span style={s.streakBadge}><Flame size={10} color="#0B0C10" strokeWidth={2.6} fill="#0B0C10" />{streak}</span>}
          {!editMode && timedHint && <span style={s.timedBadge}>▶{h.min || 5}</span>}
          {!editMode && h.url && h.url.trim() && (
            <a href={/^https?:\/\//i.test(h.url.trim()) ? h.url.trim() : `https://${h.url.trim()}`}
              target="_blank" rel="noopener noreferrer" aria-label={`${h.name} のリンクを開く`}
              onPointerDown={(e) => e.stopPropagation()} onClick={(e) => e.stopPropagation()} style={s.linkBadge}>
              <ExternalLink size={11} color={T.lo} strokeWidth={2.4} />
            </a>
          )}
          {editMode && <button style={s.editBadge} onClick={(e) => { e.stopPropagation(); openEdit(i); }} aria-label={`${h.name} を編集`}><Pencil size={11} color="#0B0C10" strokeWidth={2.6} /></button>}
        </div>
        <span style={s.cellLabel}>{h.name}</span>
        {perDay > 1 && dueT && !full && <span style={{ ...s.cellStatus, color: tdc >= perDay ? T.gold : T.lo }}>{tdc}/{perDay}</span>}
        </>)}
      </div>
    );
  };

  return (
    <div className="tsumiki-app" style={s.page} onContextMenu={(e) => e.preventDefault()}>
      <style>{KEY}</style>
      <div style={{ ...s.screen, gap: screenGap, padding: compact === 2 ? "10px 20px 14px" : compact === 1 ? "13px 20px 16px" : "16px 20px 18px", touchAction: "none" }} onPointerDown={onStageDown} onPointerMove={onStageMove} onPointerUp={onStageUp} onPointerCancel={onStageCancel}>
        <div style={s.bar}>
          <span style={s.wordmark}>TSUMIKI</span>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button style={s.colBtn} onClick={() => setShowCol(true)}>✦ {collection.length}</button>
            <button style={s.iconBtn} aria-label="設定" onClick={() => { setIoMsg(""); setShowSettings(true); }}><Settings size={17} color={T.lo} strokeWidth={2} /></button>
          </div>
        </div>

        <div style={{ ...s.idBlock, paddingTop: idBlockPT }}>
          {hasGoal ? (<>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={s.idLabel}>なりたい自分</div>
              <div key={g.id} style={{ ...s.idName, fontSize: idNameSize, marginTop: idNameMT, color: full ? T.gold : T.hi, animation: "achfade .3s ease" }}>{g.name}{full ? "（なれた）" : ""}</div>
            </div>
            <button style={s.analyzeBtn} onClick={() => setGoalDetail(curGi)} aria-label="分析"><BarChart3 size={16} color={T.lo} strokeWidth={2.2} /></button>
          </>) : (
            <div style={{ visibility: "hidden" }} aria-hidden>
              <div style={s.idLabel}>なりたい自分</div>
              <div style={s.idName}>&nbsp;</div>
            </div>
          )}
        </div>

        <div ref={stageRef} style={{ ...s.stageWrap, position: "relative" }}>
          <div style={{ animation: trans ? `${trans.dir > 0 ? "orbInNext" : "orbInPrev"} .3s cubic-bezier(.22,1,.3,1)` : "none", opacity: drag ? 0 : 1 }}>
            <canvas ref={canvasRef} style={{ width: compact === 2 ? 288 : 320, height: compact === 2 ? 270 : 300, maxWidth: "100%", display: "block", margin: "0 auto", transition: "width .2s, height .2s" }} />
          </div>
          {trans && <img src={trans.url} alt="" onAnimationEnd={() => setTrans(null)} style={{ position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)", width: 320, height: 300, maxWidth: "100%", pointerEvents: "none", animation: `${trans.dir > 0 ? "orbOutNext" : "orbOutPrev"} .3s cubic-bezier(.22,1,.3,1) forwards` }} />}
          {hasGoal && cap > 0 && (
            <div style={s.frameTL}>
              {full ? <span style={{ ...s.frameN, color: T.gold, opacity: 1 }}>達成</span> : (<>
                <span style={s.frameN}>{cnt}</span><span style={s.frameU}>粒</span>
                <span style={s.framePct}>{Math.round(cnt / cap * 100)}%</span>
              </>)}
            </div>
          )}
          {hasGoal && cap === 0 && <div style={s.frameTL}><span style={{ ...s.frameU, fontSize: 12 }}>習慣を追加</span></div>}
          {hasGoal && (
            <div style={s.orbPhotoCtrl}>
              {photos[g.id] && <button style={s.orbPhotoBtn} onPointerDown={(e) => e.stopPropagation()} onClick={() => clearOrbPhoto(g.id)} aria-label="写真を外す">×</button>}
              <button style={s.orbPhotoBtn} onPointerDown={(e) => e.stopPropagation()} onClick={() => orbFileRef.current?.click()} aria-label="器の写真"><Camera size={15} color={T.lo} strokeWidth={2} /></button>
              <input ref={orbFileRef} type="file" accept="image/*" onChange={onOrbFile(g.id)} style={{ display: "none" }} />
            </div>
          )}
          {onAdd && (
            <div style={s.emptyOver}>
              <button style={s.addOrbPlus} onClick={openWizard} aria-label="なりたい自分を追加"><Plus size={38} color={T.gold} strokeWidth={2} /></button>
              <div style={s.addOrbLab}>{addKind === "first" ? "なりたい自分を追加しよう" : "なりたい自分を追加"}</div>
            </div>
          )}
          {drag && (
            <div ref={trackRef} style={{ position: "absolute", top: 0, left: 0, width: drag.w * 3, height: 300, transform: `translateX(${-drag.w}px)`, willChange: "transform", pointerEvents: "none" }}>
              {drag.urls.map((u, k) => (
                <div key={k} style={{ position: "absolute", top: 0, left: k * drag.w, width: drag.w, height: 300, display: "flex", justifyContent: "center" }}>
                  <img src={u} alt="" style={{ width: 320, maxWidth: "100%", height: 300, display: "block" }} />
                </div>
              ))}
            </div>
          )}
        </div>
        {allClear && <div style={s.clearLine}>✦ 今日のぶん、ぜんぶできた</div>}

        {/* page nav：4つの器スロット */}
        <div style={{ ...s.dots, touchAction: "none" }}
          onPointerDown={() => { dotHoldRef.current = setTimeout(openGoalMgr, 800); }}
          onPointerUp={() => clearTimeout(dotHoldRef.current)}
          onPointerCancel={() => clearTimeout(dotHoldRef.current)}
          onPointerLeave={() => clearTimeout(dotHoldRef.current)}
        >
          <button style={s.arrow} onClick={() => goRel(-1)}>‹</button>
          {slots.map((slot, i) => slot.type === "add"
            ? <button key={"a" + i} onClick={() => setPage(i)} style={{ ...s.dotPlus, ...(i === slotPos ? { borderColor: T.gold, color: T.gold } : {}) }}>＋</button>
            : <button key={slot.gi} onClick={() => setPage(i)} style={{ ...s.dot, ...(i === slotPos ? s.dotOn : {}) }} />
          )}
          <button style={s.arrow} onClick={() => goRel(1)}>›</button>
        </div>
        {onAdd && <div style={s.addHint}>{addKind === "first" ? <>ひと粒ずつ積もって、<br />なりたい自分になっていく。</> : <>器は最大4つ。<br />並べて、同時に育てられる。</>}</div>}
        {onAdd && <div style={{ flex: 1 }} />}

        {hasGoal && (<div style={{ ...s.todayBand, gap: compact === 2 ? 0 : compact === 1 ? 4 : 10 }}>
        {/* 日送り（プロト検証用）。DEV のときだけ表示 */}
        {DEV && <div style={{ ...s.dayRow, marginBottom: compact === 2 ? -12 : compact === 1 ? -10 : -6 }}>
          <span style={s.dayLab}>{(() => { const d = new Date(); d.setDate(d.getDate() + dayOffset); return `${d.getMonth() + 1}/${d.getDate()}（${WD[d.getDay()]}）${dayOffset === 0 ? "・今日" : ""}`; })()}</span>
          {dayOffset !== 0 && <button style={s.dayBtn} onClick={() => setDayOffset(0)}>今日に戻す</button>}
          <button style={s.dayBtn} onClick={() => setDayOffset((o) => o + 1)}>翌日へ →</button>
        </div>}

        {/* habits */}
        {g.habits.length === 0 ? (
          <div style={s.noHabits}>
            <div style={s.noHabitsTxt}>まだ習慣がない。<br />「{g.name}」に近づく小さな行動を足そう。</div>
            <button style={s.addCell} onClick={openAdd}><Plus size={28} color={T.gold} strokeWidth={2} /></button>
            <span style={s.cellLabel}>習慣を追加</span>
          </div>
        ) : (
        <div style={{ ...s.habits, gap: compact === 2 ? 2 : compact === 1 ? 3 : 4 }}>
          {showCoach && !editMode && <div style={s.coach}>アイコンを長押しすると、器にひと粒落ちます<span style={s.coachArrow}>▾</span></div>}
          <div style={{ ...s.grid, gap: compact === 2 ? 4 : compact === 1 ? 8 : 12 }}>
          {habitRows.map((row, ri) => {

            <div key={ri} style={two

              {row.map((it) => it.add ? (
                <div key="add" style={{ ...s.cell, animation: "cellIn .58s cubic-bezier(.2,.8,.3,1) both" }}>

                  <span style={s.cellLabel}>追加</span>
                </div>
              ) : renderHabitCell(it.h, it.i))}
            </div>
            );
          })}
          </div>
          <div style={s.habitTools}>
            <button style={{ ...s.editIcon, ...(editMode ? s.editIconOn : {}) }} onClick={() => setEditMode((m) => !m)} aria-label={editMode ? "完了" : "習慣を編集"}>
              {editMode ? <Check size={15} color="#0B0C10" strokeWidth={3} /> : <Pencil size={14} color={T.lo} strokeWidth={2.2} />}
            </button>
          </div>
        </div>
        )}
        <div style={s.hint}>{full ? "この器は満タン。見立てた回数に到達＝達成。" : "長押しで溜まる。器は見立てた日数ぶんで満タンになる"}</div>
        </div>)}
      </div>

      {/* 器管理オーバーレイ（dotsバー長押しで開く） */}
      {goalMgr && (
        <div style={{ ...s.overlay, zIndex: 65 }} onClick={() => setGoalMgr(false)}>
          <div style={{ ...s.modal, gap: 12 }} onClick={(e) => e.stopPropagation()}>
            <div style={s.mTitle}>器を並べ替え</div>
            <div style={s.mSub}>上下のボタンで順番を入れ替え。削除すると粒の記録も消えます。</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {slots.map((slot, i) => {
                const isGoal = slot.type === "goal";
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, background: T.surface, border: `1px solid ${T.hair}`, borderRadius: 12, padding: "8px 10px" }}>
                    {gmSnaps[i]
                      ? <img src={gmSnaps[i]} alt="" draggable={false} style={{ width: 44, height: 42, objectFit: "cover", flexShrink: 0 }} />
                      : <div style={{ width: 44, height: 42, flexShrink: 0 }} />
                    }
                    <div style={{ flex: 1, minWidth: 0, fontSize: 13, fontWeight: 600, color: isGoal ? T.hi : T.lo2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                      {isGoal ? goals[slot.gi].name : "空き"}
                    </div>
                    {isGoal && (<>
                      <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                        <button disabled={i === 0} onClick={() => swapGoalSlots(i, i - 1)}
                          style={{ background: "transparent", border: `1px solid ${T.hair2}`, borderRadius: 8, width: 30, height: 22, display: "flex", alignItems: "center", justifyContent: "center", cursor: i === 0 ? "default" : "pointer", opacity: i === 0 ? 0.3 : 1, padding: 0 }} aria-label="上へ">
                          <ChevronUp size={15} color={T.hi} strokeWidth={2.4} />
                        </button>
                        <button disabled={i >= activeIdx.length - 1} onClick={() => swapGoalSlots(i, i + 1)}
                          style={{ background: "transparent", border: `1px solid ${T.hair2}`, borderRadius: 8, width: 30, height: 22, display: "flex", alignItems: "center", justifyContent: "center", cursor: i >= activeIdx.length - 1 ? "default" : "pointer", opacity: i >= activeIdx.length - 1 ? 0.3 : 1, padding: 0 }} aria-label="下へ">
                          <ChevronDown size={15} color={T.hi} strokeWidth={2.4} />
                        </button>
                      </div>
                      <button onClick={() => setGmConfirm({ gi: slot.gi, name: goals[slot.gi].name })}
                        style={{ background: "transparent", border: `1px solid rgba(220,60,60,0.35)`, borderRadius: 999, padding: "4px 10px", fontSize: 11, color: "rgba(220,80,80,0.85)", cursor: "pointer", flexShrink: 0 }}>削除</button>
                    </>)}
                  </div>
                );
              })}
            </div>
            <button style={{ ...s.back, alignSelf: "stretch", marginTop: 4 }} onClick={() => setGoalMgr(false)}>閉じる</button>
          </div>
        </div>
      )}

      {/* 器の削除確認 */}
      {gmConfirm && (
        <div style={{ ...s.overlay, zIndex: 80 }} onClick={() => setGmConfirm(null)}>
          <div style={{ ...s.modal, gap: 14, textAlign: "center", maxWidth: 320 }} onClick={(e) => e.stopPropagation()}>
            <div style={s.mTitle}>本当に削除しますか？</div>
            <div style={s.mSub}>「{gmConfirm.name}」と、積んだ粒の記録がすべて消えます。これは元に戻せません。</div>
            <div style={s.navRow}>
              <button style={{ ...s.back, flex: 1 }} onClick={() => setGmConfirm(null)}>やめる</button>
              <button style={{ ...s.create, flex: 1, background: "rgba(220,60,60,0.9)", color: "#fff" }}
                onClick={() => { deleteGoalAt(gmConfirm.gi); setGmConfirm(null); }}>削除する</button>
            </div>
          </div>
        </div>
      )}

      {/* 初回イントロ（4枚：概念→練習→哲学→ゴール） */}
      {showIntro && (
        <div style={{ ...s.overlay, zIndex: 70 }}>
          <div style={{ ...s.modal, alignItems: "center", textAlign: "center", maxWidth: 360, gap: 12, maxHeight: "92vh", overflowY: "auto" }}>
            <div style={s.steps}>{[0, 1, 2, 3].map((n) => <span key={n} style={{ ...s.stepDot, ...(n <= introStep ? s.stepOn : {}) }} />)}</div>
            {introStep === 0 && (<>
              <div style={{ margin: "2px 0" }}><MiniOrb colors={[]} size={132} done={false} /></div>
              <div style={s.introLabel}>TSUMIKI</div>
              <div style={s.introTitle}>なりたい自分を、器に。</div>
              <div style={s.introBody}>「なりたい自分」をひとつ決めます。たとえば「いい体になる」。それが、からっぽの器になります。</div>
            </>)}
            {introStep === 1 && (<>
              <div style={{ margin: "2px 0" }}><MiniOrb colors={[[128, 142, 174]]} size={132} done={false} /></div>
              <div style={s.introTitle}>やったら、長押し。</div>
              <div style={s.introBody}>なりたい自分がやっていそうな習慣を登録します。習慣ができたらボタンを長押しすると、器に粒がひとつ落ちます。</div>
            </>)}
            {introStep === 2 && (<>
              <div style={{ margin: "2px 0" }}><MiniOrb colors={INTRO_GRAINS} size={132} done /></div>
              <div style={s.introTitle}>粒は、あなたの行動。</div>
              <div style={s.introBody}>一粒一粒が、あなたの行動そのものです。積もった粒が、なりたい自分の一部になっている。</div>
            </>)}
            {introStep === 3 && (<>
              <div style={{ margin: "2px 0" }}><MiniOrb colors={INTRO_GRAINS} size={132} done /></div>
              <div style={s.introTitle}>満ちたら、なれた自分。</div>
              <div style={s.introBody}>器が粒でいっぱいになったら達成。「なれた自分」として、コレクションに並びます。</div>
            </>)}
            <button style={{ ...s.create, alignSelf: "stretch" }} onClick={() => introStep < 3 ? setIntroStep(introStep + 1) : dismissIntro()}>{introStep < 3 ? "次へ" : "はじめる"}</button>
            <button style={s.introSkip} onClick={() => introStep > 0 ? setIntroStep(introStep - 1) : dismissIntro()}>{introStep > 0 ? "もどる" : "スキップ"}</button>
          </div>
        </div>
      )}

      {/* create wizard */}
      {wiz && (
        <div style={s.overlay} onClick={() => setWiz(null)}>
          <div style={s.modal} onClick={(e) => e.stopPropagation()}>
            {wiz.step <= 1 && <div style={s.steps}>{[0, 1].map((n) => <span key={n} style={{ ...s.stepDot, ...(n <= wiz.step ? s.stepOn : {}) }} />)}</div>}

            {wiz.step === 0 && (
              <>
                <div style={s.mTitle}>どうなりたい？</div>
                <div style={s.mSub}>3週間後でも1年後でもいい。なりたい自分を一言で。</div>
                <input style={s.input} autoFocus value={wiz.name} placeholder="例：いい体を作る"
                  onChange={(e) => setWiz((w) => ({ ...w, name: e.target.value }))} />
                <button style={{ ...s.create, opacity: wiz.name.trim() ? 1 : 0.4 }} disabled={!wiz.name.trim()}
                  onClick={() => setWiz((w) => ({ ...w, step: 1 }))}>次へ</button>
              </>
            )}

            {wiz.step === 1 && (
              <>
                <div style={s.mTitle}>何日で、なれてたい？</div>
                <div style={s.mSub}>「{wiz.name}」になるまでの器の大きさになります。あとから変えられます。</div>
                <div style={s.periodRow}>
                  {[{ lab: "3週間", d: 21 }, { lab: "1ヶ月", d: 30 }, { lab: "3ヶ月", d: 90 }, { lab: "半年", d: 180 }].map((p) => (
                    <button key={p.lab} style={{ ...s.periodChip, ...(wiz.days === p.d ? s.periodOn : {}) }}
                      onClick={() => setWiz((w) => ({ ...w, days: p.d }))}>{p.lab}</button>
                  ))}
                </div>
                <div style={s.capBox}>
                  <div style={s.capLab}>器の大きさ</div>
                  <div style={s.capBig}>{wiz.days}<span style={{ fontSize: 13, color: T.lo, fontWeight: 400 }}> 日ぶん</span></div>
                  <input type="range" min="7" max="365" step="1" value={wiz.days} style={{ width: "100%", accentColor: T.gold, marginTop: 10 }}
                    onChange={(e) => setWiz((w) => ({ ...w, days: +e.target.value }))} />
                  <div style={s.capCalc}>このぶんを積み上げたら「なれた」。習慣はこの後、ゴールの画面で足していく。</div>
                </div>
                <div style={s.navRow}>
                  <button style={s.back} onClick={() => setWiz((w) => ({ ...w, step: 0 }))}>戻る</button>
                  <button style={{ ...s.create, flex: 1 }} onClick={() => createGoal(wiz.days)}>この自分を作る</button>
                </div>
              </>
            )}

            {wiz.step === 2 && (
              <>
                <div style={s.mTitle}>なりたい自分が、している習慣は？</div>
                <div style={s.mSub}>「{wiz.name}」に近づく行動を、ひとつ。やるたび器に積もります。あとから増やせます。</div>
                <button style={s.create} onClick={() => { const i = wiz.newIdx; setWiz(null); setEditor({ gi: i, hIndex: -1, draft: blankDraft(0) }); }}>習慣を決める</button>
                <button style={s.back} onClick={() => setWiz(null)}>あとで</button>
              </>
            )}
          </div>
        </div>
      )}

      {/* habit manager */}
      {editList && (
        <div style={s.overlay} onClick={() => setEditList(false)}>
          <div style={s.modal} onClick={(e) => e.stopPropagation()}>
            <div style={s.mTitle}>ゴールを編集</div>
            <div style={s.field}><label style={s.lab}>なりたい自分</label>
              <input style={s.input} value={g.name} onChange={(e) => setGoals((gs) => gs.map((x, k) => k === curGi ? { ...x, name: e.target.value } : x))} /></div>
            <div style={s.field}><label style={s.lab}>何日で（締切）</label>
              <input style={s.input} type="number" value={g.days || 30} onChange={(e) => setGoals((gs) => gs.map((x, k) => k === curGi ? { ...x, days: Math.max(1, +e.target.value || 1) } : x))} />
              <div style={s.mSub}>目標 = 日数 × 習慣のペース ＝ <b style={{ color: T.gold }}>{cap}粒</b>。習慣を足すと目標も増える（同じ日数ぶんの量なので楽にはならない）。積んだ粒は減りません。</div></div>
            <button style={s.create} onClick={() => setEditList(false)}>完了</button>
          </div>
        </div>
      )}

      {/* habit editor */}
      {editor && (() => {
        const d = editor.draft;
        const goalName = goals[editor.gi]?.name;
        const isTimed = d.type === "timed";
        const daysBad = d.fmode === "days" && d.days.length === 0; // 曜日モードで0日＝詰める手段がない
        const PrevIcon = ICONS[d.iconIdx] || Star;
        const col = `rgb(${SWATCHES[d.colorIdx].join(",")})`;
        // アイコン・絵文字の選択ページ（決めたらエディタに戻る）
        if (editor.pickerOpen) {
          const tab = editor.pickerTab || "emoji";
          return (
            <div style={s.overlay} onPointerDown={(e) => e.stopPropagation()} onClick={() => setEditor((e) => ({ ...e, pickerOpen: false }))}>
              <div style={{ ...s.modal, maxHeight: "90vh", display: "flex", flexDirection: "column", gap: 12 }} onClick={(e) => e.stopPropagation()}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <button style={{ ...s.back, padding: "6px 12px", flex: "0 0 auto" }} onClick={() => setEditor((e) => ({ ...e, pickerOpen: false }))}>← 戻る</button>
                  <div style={{ ...s.mTitle, margin: 0 }}>{tab === "emoji" ? "絵文字を選ぶ" : "アイコンを選ぶ"}</div>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button style={{ ...s.periodChip, flex: 1, ...(tab === "emoji" ? s.periodOn : {}) }} onClick={() => setEditor((e) => ({ ...e, pickerTab: "emoji" }))}>絵文字</button>
                  <button style={{ ...s.periodChip, flex: 1, ...(tab === "icon" ? s.periodOn : {}) }} onClick={() => setEditor((e) => ({ ...e, pickerTab: "icon" }))}>アイコン</button>
                </div>
                {tab === "emoji" ? (<>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input style={{ ...s.input, width: 60, textAlign: "center", fontSize: 22, padding: "6px 4px" }} value={d.emoji} placeholder="😀" maxLength={4}
                      onChange={(e) => setD({ emoji: [...e.target.value].slice(-1).join(""), iconAuto: false })} />
                    <span style={{ fontSize: 11.5, color: T.lo }}>好きな絵文字を直接入力してもOK</span>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 7, flex: 1, overflowY: "auto", paddingRight: 2, alignContent: "start" }}>
                    {EMOJIS.map((em, k) => (
                      <button key={k} style={{ ...s.emojiCell, ...(d.emoji === em ? s.iconOn : {}) }}
                        onClick={() => setEditor((e) => ({ ...e, draft: { ...e.draft, emoji: em, iconAuto: false }, pickerOpen: false }))}>
                        <span style={{ fontSize: 23, lineHeight: 1 }}>{em}</span>
                      </button>
                    ))}
                  </div>
                </>) : (
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 7, flex: 1, overflowY: "auto", paddingRight: 2, alignContent: "start" }}>
                    {ICONS.map((Ic, k) => Ic ? (
                      <button key={k} style={{ ...s.iconCell, ...(!d.emoji && d.iconIdx === k ? s.iconOn : {}) }}
                        onClick={() => setEditor((e) => ({ ...e, draft: { ...e.draft, iconIdx: k, emoji: "", iconAuto: false }, pickerOpen: false }))}>
                        <Ic size={23} color={!d.emoji && d.iconIdx === k ? T.gold : T.hi} strokeWidth={2} />
                      </button>
                    ) : null)}
                  </div>
                )}
              </div>
            </div>
          );
        }
        return (
        <div style={s.overlay} onPointerDown={(e) => e.stopPropagation()} onClick={() => setEditor(null)}>
          <div style={{ ...s.modal, maxHeight: "88vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
            <div style={s.mTitle}>{editor.hIndex < 0 ? "習慣を追加" : "習慣を編集"}</div>
            {editor.hIndex < 0 && goalName && <div style={s.mSub}>「{goalName}」に近づく行動を、ひとつ。</div>}

            {/* 種別：アイコンで選ぶ */}
            <div style={s.typeRow}>
              {TYPES.map((t) => {
                const on = d.type === t.id;
                return (
                  <button key={t.id} style={{ ...s.typeBtn, ...(on ? s.typeBtnOn : {}) }} onClick={() => setD({ type: t.id })} aria-label={t.lab} title={t.lab}>
                    <t.Icon size={22} color={on ? T.gold : T.lo} strokeWidth={2} />
                  </button>
                );
              })}
            </div>
            <div style={s.typeDesc}>{TYPES.find((t) => t.id === d.type)?.desc}</div>

            {/* 名前（打つとアイコンが追従）＋ 選択中アイコン */}
            <div style={s.nameRow}>
              <button style={{ ...s.iconPreview, borderColor: col }} onClick={() => setEditor((e) => ({ ...e, pickerOpen: true, pickerTab: e.draft.emoji ? "emoji" : "icon" }))}>
                {d.emoji ? <span style={{ fontSize: 24, lineHeight: 1 }}>{d.emoji}</span> : <PrevIcon size={24} color={col} strokeWidth={2.2} />}
              </button>
              <input style={{ ...s.input, flex: 1, fontSize: 16 }} autoFocus value={d.name} placeholder="例：朝ストレッチ"
                onChange={(e) => { const name = e.target.value; setD(d.iconAuto && !d.emoji ? { name, iconIdx: guessIcon(name) } : { name }); }} />
            </div>
            <button style={s.iconToggle} onClick={() => setEditor((e) => ({ ...e, pickerOpen: true, pickerTab: e.draft.emoji ? "emoji" : "icon" }))}>アイコン・絵文字を変える</button>

            {/* 頻度 */}
            <div style={s.field}><label style={s.lab}>頻度</label>
              <div style={s.periodRow}>
                {[["daily", "毎日"], ["days", "曜日"], ["week", "週◯回"]].map(([m, l]) => (
                  <button key={m} style={{ ...s.periodChip, ...(d.fmode === m ? s.periodOn : {}) }} onClick={() => setD({ fmode: m })}>{l}</button>
                ))}
              </div>
              {d.fmode === "days" && (
                <div style={{ display: "flex", gap: 5, marginTop: 8, justifyContent: "space-between" }}>
                  {WD.map((wd, k) => {
                    const on = d.days.includes(k);
                    return <button key={k} onClick={() => setD({ days: on ? d.days.filter((x) => x !== k) : [...d.days, k] })}
                      style={{ ...s.wd, ...(on ? s.wdOn : {}) }}>{wd}</button>;
                  })}
                </div>
              )}
              {daysBad && <div style={{ ...s.mSub, color: "#E08", marginTop: 6 }}>曜日を1つ以上選んでください</div>}
              {d.fmode === "week" && (
                <div style={{ marginTop: 8 }}><label style={s.lab}>週に何回</label>
                  <div style={s.sliderRow} onPointerDown={(e) => e.stopPropagation()}>
                    <input type="range" min="1" max="7" step="1" value={d.perWeek} style={s.slider} onChange={(e) => setD({ perWeek: +e.target.value })} />
                    <span style={s.sliderVal}>{d.perWeek}回</span>
                  </div>
                </div>
              )}
            </div>

            {/* 詳細：畳んでおく */}
            <button style={s.detailToggle} onClick={() => setEditor((e) => ({ ...e, detailOpen: !e.detailOpen }))}>
              <span>詳細設定</span>
              <ChevronDown size={16} color={T.lo} style={{ transform: editor.detailOpen ? "rotate(180deg)" : "none", transition: "transform .2s" }} />
            </button>
            {editor.detailOpen && (<>
              {isTimed ? (
                <>
                  <div style={s.field}><label style={s.lab}>分</label>
                    <div style={s.sliderRow} onPointerDown={(e) => e.stopPropagation()}>
                      <input type="range" min="1" max="120" step="1" value={d.min} style={s.slider} onChange={(e) => setD({ min: +e.target.value })} />
                      <span style={s.sliderVal}>{d.min}分</span>
                    </div>
                  </div>
                  <div style={s.field}><label style={s.lab}>1日に何回</label>
                    <div style={s.sliderRow} onPointerDown={(e) => e.stopPropagation()}>
                      <input type="range" min="1" max="10" step="1" value={d.perDay} style={s.slider} onChange={(e) => setD({ perDay: +e.target.value })} />
                      <span style={s.sliderVal}>{d.perDay}回</span>
                    </div>
                  </div>
                </>
              ) : d.fmode !== "week" && (
                <div style={s.field}><label style={s.lab}>1日に何回</label>
                  <div style={s.sliderRow} onPointerDown={(e) => e.stopPropagation()}>
                    <input type="range" min="1" max="10" step="1" value={d.perDay} style={s.slider} onChange={(e) => setD({ perDay: +e.target.value })} />
                    <span style={s.sliderVal}>{d.perDay}回</span>
                  </div>
                </div>
              )}

              <div style={s.field}><label style={s.lab}>色</label>
                <div style={s.swRow}>
                  {SWATCHES.map((c, k) => (
                    <button key={k} onClick={() => setD({ colorIdx: k })}
                      style={{ ...s.sw, background: `rgb(${c.join(",")})`, outline: d.colorIdx === k ? `2px solid ${T.hi}` : "none" }} />
                  ))}
                </div>
              </div>

              <div style={s.field}>
                <div style={{ background: T.surface, border: `1px solid ${T.hair}`, borderRadius: 10, padding: "10px 12px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", opacity: 0.38, pointerEvents: "none" }}>
                    <label style={s.lab}>リマインダー</label>
                    <button style={{ ...s.toggle, background: T.hair2 }}>
                      <span style={{ ...s.knob }} />
                    </button>
                  </div>
                  <div style={{ ...s.mSub, marginTop: 6 }}>アプリ版で対応予定</div>
                </div>
              </div>

              <div style={s.field}><label style={s.lab}>アクションURL（任意）</label>
                <input style={s.input} value={d.url} placeholder="https://..." onChange={(e) => setD({ url: e.target.value })} /></div>
            </>)}

            <div style={s.navRow}>
              {editor.hIndex >= 0 && <button style={{ ...s.back, color: "#E08", borderColor: "rgba(255,80,120,0.4)" }} onClick={deleteHabit}>削除</button>}
              <button style={{ ...s.create, flex: 1, opacity: (d.name.trim() && !daysBad) ? 1 : 0.4 }} disabled={!d.name.trim() || daysBad} onClick={saveHabit}>保存</button>
            </div>
          </div>
        </div>
        );
      })()}

      {/* achievement ceremony */}
      {achieved !== null && (
        <div style={s.achOverlay}>
          <div style={s.achGlow} />
          <div style={s.achInner}>
            <MiniOrb colors={(ballsBy.current[goals[achieved]?.id] || []).map((b) => b.c)} size={124} done />
            <div style={s.achLabel}>なれた自分</div>
            <div style={s.achGoal2}>{goals[achieved].name}</div>
            <div style={s.achRule} />
            <div style={s.achSub}>{capOf(goals[achieved])}粒、積み上げた</div>
            <div style={s.achNote}>コレクションに加わりました</div>
            <button style={{ ...s.create, marginTop: 10, alignSelf: "stretch" }} onClick={() => { graduate(achieved); setAchieved(null); openWizard(); }}>新しい自分を始める</button>
            <button style={s.achClose} onClick={() => { graduate(achieved); setAchieved(null); }}>とじる</button>
          </div>
        </div>
      )}

      {/* settings */}
      {showSettings && (
        <div style={s.overlay} onClick={() => setShowSettings(false)}>
          <div style={s.modal} onClick={(e) => e.stopPropagation()}>
            <div style={{ ...s.mTitle, marginBottom: 14 }}>設定</div>
            <div style={s.setSection}>テーマ</div>
            <div style={s.swatchRow}>
              {THEME_ORDER.map(([k, name]) => (
                <div key={k} style={s.swatchItem} onClick={() => setTheme(k)}>
                  <div style={{ ...s.swatch, background: THEMES[k].bg, borderColor: theme === k ? T.gold : THEMES[k].hair2, boxShadow: theme === k ? `0 0 0 2px ${T.gold}` : "none" }}>
                    <span style={{ width: 9, height: 9, borderRadius: 999, background: THEMES[k].gold }} />
                  </div>
                  <span style={s.swatchLab}>{name}</span>
                </div>
              ))}
            </div>
            <div style={s.setSection}>バックアップ</div>
            <div style={s.setHint}>記録は端末の中だけに保存されます。機種変更やデータ消去で消えないよう、ときどき書き出して保管してください。</div>
            <button style={{ ...s.create, alignSelf: "stretch", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }} onClick={exportData}><Download size={15} />データを書き出す</button>
            <button style={{ ...s.back, alignSelf: "stretch", marginTop: 8, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }} onClick={() => importRef.current?.click()}><Upload size={15} />バックアップから読み込む</button>
            <input ref={importRef} type="file" accept="application/json,.json" onChange={onImportFile} style={{ display: "none" }} />
            {ioMsg && <div style={{ ...s.setHint, color: T.gold, marginTop: 10, textAlign: "center" }}>{ioMsg}</div>}
            <button style={{ ...s.back, alignSelf: "stretch", marginTop: 16 }} onClick={() => setShowSettings(false)}>閉じる</button>
          </div>

      {/* collection */}
      {showCol && (
        <div style={s.overlay} onClick={() => setShowCol(false)}>
          <div style={{ ...s.modal, maxHeight: "86vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>

              <div style={s.colGrid}>

                  <div key={i} style={{ ...s.colItem, cursor: "pointer" }} onClick={() => { setShowCol(false); setColDetail(it); }}>

      {colDetail && (
        <div style={s.overlay} onClick={() => setColDetail(null)}>
          <div style={s.modal} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "center" }}><MiniOrb colors={colDetail.colors} size={140} /></div>
            <div style={{ textAlign: "center" }}>
              <div style={s.idLabel}>なれた自分</div>
              <div style={{ ...s.mTitle, fontSize: 20, marginTop: 4 }}>{colDetail.name}</div>
              <div style={s.colMeta}>{colDetail.capacity}粒・{colDetail.date}</div>

            <div style={s.field}>
              <label style={s.lab}>何でできていたか</label>

                <div key={i} style={s.compRow}>

              ))}

          </div>
        </div>
      )}

      {/* goal detail page */}
      {goalDetail !== null && (() => {
        const gi = goalDetail, gg = goals[gi];
        const colors = (ballsBy.current[gg.id] || []).map((b) => b.c);
        const cntD = colors.length, capD = capOf(gg), pct = capD ? Math.min(100, Math.round(cntD / capD * 100)) : 0, remain = Math.max(0, capD - cntD);
        const doneD = capD > 0 && cntD >= capD;
        // この調子で何日：理想ペースではなく、直近14日の“実際に積んだ”ペースで見積もる
        const ESTWIN = 14, winFrom = day - ESTWIN + 1;
        let recentGrains = 0;
        gg.habits.forEach((h) => { const L = logs[gg.id + ":" + h.id]; if (L?.hist) Object.entries(L.hist).forEach(([dd, c]) => { if (+dd >= winFrom && +dd <= day) recentGrains += c; }); });
        const earliestStart = gg.habits.reduce((m, h) => Math.min(m, h.startDay || 0), day);
        const obsDays = Math.max(1, Math.min(ESTWIN, day - earliestStart + 1)); // 観測できた日数（ゴールが若ければそのぶん短く）
        const recentPace = recentGrains / obsDays;
        const estDays = recentPace > 0 ? Math.ceil(remain / recentPace) : null; // 直近ゼロなら見積もり不能＝「—」
        const freqLabel = (h) => { const m = h.fmode || "daily"; const pd = Math.max(1, h.perDay || 1); let b = m === "week" ? `週${h.perWeek || 3}回` : m === "days" ? ((h.days || []).map((d) => WD[d]).join("") || "曜日") : "毎日"; if (pd > 1) b += `・1日${pd}回`; return b; };
        const typeLabel = (h) => h.type === "neg" ? "やめる" : h.type === "timed" ? `${h.min || 5}分` : null;
        const start = Math.max(0, day - 13); const ratePts = [];
        for (let d = start; d <= day; d++) {
          let act = 0, exp = 0;
          gg.habits.forEach((h, i) => { const sd = h.startDay || 0; if (d < sd) return; const L = logs[gg.id + ":" + h.id]; if (L?.hist) Object.entries(L.hist).forEach(([dd, c]) => { if (+dd <= d) act += c; }); exp += pace([h]) * (d - sd + 1); });
          ratePts.push({ d, r: exp > 0 ? Math.min(100, act / exp * 100) : 0 });
        }
        const overallRate = ratePts.length ? Math.round(ratePts[ratePts.length - 1].r) : 0;
        const CW = 300, CH = 84, PX = 6, PY = 8, np = ratePts.length;
        const xOf = (i) => PX + (np <= 1 ? (CW - 2 * PX) / 2 : i / (np - 1) * (CW - 2 * PX));
        const yOf = (r) => CH - PY - (r / 100) * (CH - 2 * PY);
        const linePts = ratePts.map((p, i) => `${xOf(i).toFixed(1)},${yOf(p.r).toFixed(1)}`).join(" ");
        const areaPts = `${xOf(0).toFixed(1)},${CH - PY} ${linePts} ${xOf(np - 1).toFixed(1)},${CH - PY}`;
        return (
          <div style={s.overlay} onClick={() => setGoalDetail(null)}>
            <div style={{ ...s.modal, maxHeight: "88vh", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "center" }}><MiniOrb colors={colors} size={150} done={doneD} /></div>
              <div style={{ textAlign: "center" }}>
                <div style={s.idLabel}>{doneD ? "なれた自分" : "なりたい自分"}</div>
                <div style={{ ...s.mTitle, fontSize: 21, marginTop: 4, color: doneD ? T.gold : T.hi }}>{gg.name}</div>
              </div>
              <div style={s.gdProg}>
                <div style={s.gdBarBg}><div style={{ ...s.gdBarFill, width: pct + "%", background: doneD ? T.gold : "rgba(190,214,242,0.85)" }} /></div>
                <div style={s.gdProgRow}><span>{cntD} / {capD} 粒</span><span>{pct}%</span></div>
              </div>
              <div style={s.gdStats}>
                <div style={s.gdStat}><div style={s.gdStatN}>{remain}</div><div style={s.gdStatL}>のこり粒</div></div>
                <div style={s.gdStat}><div style={s.gdStatN}>{doneD ? "—" : (estDays != null ? `約${estDays}` : "—")}</div><div style={s.gdStatL}>この調子で日</div></div>
                <div style={s.gdStat}><div style={{ ...s.gdStatN, color: T.gold }}>{overallRate}%</div><div style={s.gdStatL}>達成率</div></div>
              </div>
              <div style={s.field}>
                <label style={s.lab}>達成率の推移</label>
                <div style={s.chartWrap}>
                  <svg viewBox={`0 0 ${CW} ${CH}`} style={{ width: "100%", display: "block" }}>
                    <line x1={PX} y1={yOf(100)} x2={CW - PX} y2={yOf(100)} stroke={T.hair2} strokeWidth="1" />
                    <line x1={PX} y1={yOf(50)} x2={CW - PX} y2={yOf(50)} stroke={T.hair} strokeWidth="1" strokeDasharray="3 4" />
                    <polygon points={areaPts} fill="rgba(201,162,74,0.12)" />
                    <polyline points={linePts} fill="none" stroke="rgb(201,162,74)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                    <circle cx={xOf(np - 1)} cy={yOf(ratePts.length ? ratePts[np - 1].r : 0)} r="3.2" fill="rgb(201,162,74)" />
                  </svg>
                  <div style={s.chartFoot}><span>{(() => { const dt = new Date(); dt.setDate(dt.getDate() + (start - now)); return `${dt.getMonth() + 1}/${dt.getDate()}`; })()}</span><span>{dayOffset === 0 ? "今日" : (() => { const dt = new Date(); dt.setDate(dt.getDate() + dayOffset); return `${dt.getMonth() + 1}/${dt.getDate()}`; })()}</span></div>
                </div>
              </div>
              <div style={s.field}>
                <label style={s.lab}>習慣ごと</label>
                {gg.habits.map((h, i) => {
                  const L = logs[gg.id + ":" + h.id] || {};
                  const cnt = (ballsBy.current[gg.id] || []).filter((b) => b.hid === h.id).length;
                  const si = streakInfo(h, L, day); const cur = si.cur, best = si.best, su = si.unit;
                  const hpace = pace([h]);
                  const elapsedH = Math.max(1, day - (h.startDay || 0) + 1);
                  const hdone = L.hist ? Object.values(L.hist).reduce((a, b) => a + b, 0) : 0;
                  const rate = hpace > 0 ? Math.min(100, Math.round(hdone / (hpace * elapsedH) * 100)) : 0;
                  const tl = typeLabel(h);
                  return (
                    <div key={i} style={s.gdHabit2}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ ...s.compDot, background: `rgb(${h.c.join(",")})` }} />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={s.gdHName}>{h.name}</div>
                          <div style={s.gdHSub}>{freqLabel(h)}{tl ? "・" + tl : ""}</div>
                        </div>
                        <span style={s.compN}>{cnt}粒</span>
                      </div>
                      <div style={s.statRow}>
                        <div style={s.statCell}><span style={s.statNum}>{rate}%</span><span style={s.statLab}>達成率</span></div>
                        <div style={s.statCell}><span style={s.statNum}>{cur}<span style={s.statU}>{su}</span></span><span style={s.statLab}>現在</span></div>
                        <div style={s.statCell}><span style={{ ...s.statNum, color: T.gold }}>{best}<span style={s.statU}>{su}</span></span><span style={s.statLab}>最高</span></div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={s.navRow}>
                <button style={{ ...s.back, flex: 1 }} onClick={() => { setGoalDetail(null); setPage(Math.max(0, activeIdx.indexOf(gi))); setEditList(true); }}>ゴールを編集</button>
                <button style={{ ...s.create, flex: 1 }} onClick={() => setGoalDetail(null)}>閉じる</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* 習慣ドラッグ中、指に追従する複製（ゴースト） */}
      {ghost && (
        <div ref={ghostRef} style={{ position: "fixed", left: 0, top: 0, zIndex: 90, pointerEvents: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, willChange: "transform", transform: `translate(${ghost.x}px, ${ghost.y}px) translate(-50%, -50%)` }}>
          <div style={{ width: 78, height: 78, borderRadius: "50%", background: T.surface2, border: `2px solid ${ghost.col}`, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 14px 30px rgba(0,0,0,0.45)", transform: "scale(1.08)" }}>
            {ghost.emoji ? <span style={{ fontSize: 27, lineHeight: 1 }}>{ghost.emoji}</span> : <ghost.Icon size={26} color={ghost.col} strokeWidth={2.2} />}
          </div>
          <span style={{ ...s.cellLabel, opacity: 0.9 }}>{ghost.name}</span>
        </div>
      )}
    </div>
  );
}

function MiniOrb({ colors, size = 96, done = true }) {
  const mgId = useRef("mg_" + uid()).current;
  const cx = size / 2, cy = size / 2, R = size / 2 - 5;
  const n = Math.min(colors.length, 30);
  const dots = [];
  for (let i = 0; i < n; i++) {
    const a = i * 2.39996, r = (R - 6) * Math.sqrt(i / Math.max(n, 1));
    const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
    const c = colors[Math.floor(i / n * colors.length)] || [200, 200, 200];
    dots.push(<circle key={i} cx={x} cy={y} r={3.1} fill={`rgb(${c.join(",")})`} opacity="0.9" />);
  }
  const rim = done ? "rgba(201,162,74,0.5)" : "rgba(255,255,255,0.18)";
  const glow = done ? "#C9A24A" : "#BFD6F2";
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs><radialGradient id={mgId}><stop offset="0%" stopColor={glow} stopOpacity="0.22" /><stop offset="100%" stopColor={glow} stopOpacity="0" /></radialGradient></defs>
      <circle cx={cx} cy={cy} r={R + 4} fill={`url(#${mgId})`} />
      <circle cx={cx} cy={cy} r={R} fill="rgba(255,255,255,0.02)" stroke={rim} strokeWidth="1.2" />
      {dots}
    </svg>
  );
}
